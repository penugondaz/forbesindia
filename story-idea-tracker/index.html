const WEEKLY_DATA = [
  { week: "Apr W3", published: 4, web: 3, magazine: 1 },
  { week: "Apr W4", published: 6, web: 4, magazine: 2 },
  { week: "May W1", published: 5, web: 3, magazine: 2 },
  { week: "May W2", published: 8, web: 6, magazine: 2 },
  { week: "May W3", published: 7, web: 5, magazine: 2 },
  { week: "May W4", published: 3, web: 2, magazine: 1 },
];

// ─── HELPERS ─────────────────────────────────────────────────────────────────

const isOverdue = (s) => {
  if (!s.eta || ["Published", "Hold/Dropped"].includes(s.status)) return false;
  return new Date(s.eta) < new Date();
};

const daysLeft = (eta) => {
  const diff = new Date(eta) - new Date();
  return Math.ceil(diff / (1000 * 60 * 60 * 24));
};

const fmtDate = (d) => d ? new Date(d).toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "numeric" }) : "—";

const Badge = ({ label, color, small }) => (
  <span style={{
    display: "inline-flex", alignItems: "center", gap: 4,
    padding: small ? "2px 8px" : "3px 10px",
    borderRadius: 20, fontSize: small ? 11 : 12, fontWeight: 500,
    background: color + "22", color: color, border: `1px solid ${color}44`,
    whiteSpace: "nowrap"
  }}>{label}</span>
);

const StatusBadge = ({ status, small }) => (
  <Badge label={status} color={STATUS_COLORS[status] || "#888"} small={small} />
);

const PriorityBadge = ({ priority, small }) => (
  <Badge label={priority} color={PRIORITY_COLORS[priority] || "#888"} small={small} />
);

// ─── FORM ─────────────────────────────────────────────────────────────────────

const EMPTY_FORM = {
  title: "", description: "", reporter: REPORTERS[0], editor: EDITORS[0],
  desk: DESKS[0], format: FORMATS[0], pubType: "Web", priority: "Medium",
  status: "Idea Proposed", eta: "", publishDate: "", issueMonth: "",
  seoKeyword: "", trafficPotential: "Medium", sponsorship: "No", notes: "", refs: ""
};

function StoryForm({ onSubmit, initial, onCancel }) {
  const [form, setForm] = useState(initial || EMPTY_FORM);
  const set = (k) => (e) => setForm(f => ({ ...f, [k]: e.target.value }));

  const inputStyle = {
    width: "100%", padding: "8px 12px", borderRadius: 8,
    border: "1px solid #e2e8f0", background: "#f8fafc",
    fontSize: 14, color: "#1e293b", outline: "none", boxSizing: "border-box"
  };
  const labelStyle = { fontSize: 12, fontWeight: 600, color: "#64748b", marginBottom: 4, display: "block", textTransform: "uppercase", letterSpacing: "0.05em" };
  const fieldStyle = { marginBottom: 16 };

  return (
    <div style={{ fontFamily: "'DM Sans', 'Helvetica Neue', sans-serif" }}>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 24px" }}>
        <div style={{ ...fieldStyle, gridColumn: "1 / -1" }}>
          <label style={labelStyle}>Story Title *</label>
          <input style={{ ...inputStyle, fontSize: 16, fontWeight: 600 }} value={form.title} onChange={set("title")} placeholder="Enter compelling story title..." />
        </div>
        <div style={{ ...fieldStyle, gridColumn: "1 / -1" }}>
          <label style={labelStyle}>Story Description / Pitch</label>
          <textarea style={{ ...inputStyle, minHeight: 80, resize: "vertical" }} value={form.description} onChange={set("description")} placeholder="Describe the story angle, key sources, why it matters now..." />
        </div>
        {[["Reporter", "reporter", REPORTERS], ["Editor", "editor", EDITORS]].map(([lbl, key, opts]) => (
          <div key={key} style={fieldStyle}>
            <label style={labelStyle}>{lbl}</label>
            <select style={inputStyle} value={form[key]} onChange={set(key)}>
              {opts.map(o => <option key={o}>{o}</option>)}
            </select>
          </div>
        ))}
        {[["Desk / Category", "desk", DESKS], ["Story Format", "format", FORMATS]].map(([lbl, key, opts]) => (
          <div key={key} style={fieldStyle}>
            <label style={labelStyle}>{lbl}</label>
            <select style={inputStyle} value={form[key]} onChange={set(key)}>
              {opts.map(o => <option key={o}>{o}</option>)}
            </select>
          </div>
        ))}
        <div style={fieldStyle}>
          <label style={labelStyle}>Publication Type</label>
          <select style={inputStyle} value={form.pubType} onChange={set("pubType")}>
            {["Web", "Magazine", "Both"].map(o => <option key={o}>{o}</option>)}
          </select>
        </div>
        <div style={fieldStyle}>
          <label style={labelStyle}>Priority Level</label>
          <select style={inputStyle} value={form.priority} onChange={set("priority")}>
            {PRIORITIES.map(o => <option key={o}>{o}</option>)}
          </select>
        </div>
        <div style={fieldStyle}>
          <label style={labelStyle}>Current Status</label>
          <select style={inputStyle} value={form.status} onChange={set("status")}>
            {STATUSES.map(o => <option key={o}>{o}</option>)}
          </select>
        </div>
        <div style={fieldStyle}>
          <label style={labelStyle}>ETA / Deadline</label>
          <input type="date" style={inputStyle} value={form.eta} onChange={set("eta")} />
        </div>
        <div style={fieldStyle}>
          <label style={labelStyle}>Publish Date</label>
          <input type="date" style={inputStyle} value={form.publishDate} onChange={set("publishDate")} />
        </div>
        <div style={fieldStyle}>
          <label style={labelStyle}>Magazine Issue Month</label>
          <input style={inputStyle} value={form.issueMonth} onChange={set("issueMonth")} placeholder="e.g. June 2026" />
        </div>
        <div style={fieldStyle}>
          <label style={labelStyle}>SEO Keyword</label>
          <input style={inputStyle} value={form.seoKeyword} onChange={set("seoKeyword")} placeholder="Primary target keyword..." />
        </div>
        <div style={fieldStyle}>
          <label style={labelStyle}>Traffic Potential</label>
          <select style={inputStyle} value={form.trafficPotential} onChange={set("trafficPotential")}>
            {["Very High", "High", "Medium", "Low"].map(o => <option key={o}>{o}</option>)}
          </select>
        </div>
        <div style={fieldStyle}>
          <label style={labelStyle}>Sponsorship Potential</label>
          <select style={inputStyle} value={form.sponsorship} onChange={set("sponsorship")}>
            {["Yes", "No", "Under Discussion"].map(o => <option key={o}>{o}</option>)}
          </select>
        </div>
        <div style={{ ...fieldStyle, gridColumn: "1 / -1" }}>
          <label style={labelStyle}>Notes</label>
          <textarea style={{ ...inputStyle, minHeight: 60, resize: "vertical" }} value={form.notes} onChange={set("notes")} placeholder="Additional notes for the team..." />
        </div>
        <div style={{ ...fieldStyle, gridColumn: "1 / -1" }}>
          <label style={labelStyle}>Reference Links</label>
          <input style={inputStyle} value={form.refs} onChange={set("refs")} placeholder="https://..." />
        </div>
      </div>
      <div style={{ display: "flex", gap: 12, marginTop: 8 }}>
        <button onClick={() => { if (form.title) onSubmit(form); }}
          style={{ flex: 1, padding: "10px 0", background: FORBES_RED, color: "#fff", border: "none", borderRadius: 8, fontWeight: 700, fontSize: 14, cursor: "pointer" }}>
          {initial ? "Update Story" : "Submit Story"}
        </button>
        <button onClick={onCancel}
          style={{ padding: "10px 24px", background: "#f1f5f9", color: "#64748b", border: "none", borderRadius: 8, fontWeight: 600, fontSize: 14, cursor: "pointer" }}>
          Cancel
        </button>
      </div>
    </div>
  );
}

// ─── MODAL ────────────────────────────────────────────────────────────────────

function Modal({ title, children, onClose, wide }) {
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.55)", zIndex: 1000, display: "flex", alignItems: "flex-start", justifyContent: "center", padding: "40px 16px", overflowY: "auto" }}>
      <div style={{ background: "#fff", borderRadius: 16, width: "100%", maxWidth: wide ? 900 : 640, boxShadow: "0 24px 80px rgba(0,0,0,0.18)" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "20px 28px", borderBottom: "1px solid #f1f5f9" }}>
          <h3 style={{ margin: 0, fontSize: 18, fontWeight: 700, color: "#1e293b" }}>{title}</h3>
          <button onClick={onClose} style={{ background: "none", border: "none", fontSize: 22, cursor: "pointer", color: "#94a3b8", lineHeight: 1 }}>×</button>
        </div>
        <div style={{ padding: "24px 28px" }}>{children}</div>
      </div>
    </div>
  );
}

// ─── STORY DETAIL ─────────────────────────────────────────────────────────────

function StoryDetail({ story, onEdit, onDelete, onStatusChange, onClose, userRole }) {
  const [comment, setComment] = useState("");
  const [comments, setComments] = useState(story.comments || []);
  const overdue = isOverdue(story);
  const days = story.eta ? daysLeft(story.eta) : null;

  const addComment = () => {
    if (!comment.trim()) return;
    const c = { id: Date.now(), text: comment, author: "You", ts: new Date().toISOString() };
    setComments(prev => [...prev, c]);
    setComment("");
  };

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
        <StatusBadge status={story.status} />
        <PriorityBadge priority={story.priority} />
        <Badge label={story.desk} color="#64748b" />
        <Badge label={story.pubType} color="#0ea5e9" />
        {overdue && <Badge label="⚠ OVERDUE" color="#ef4444" />}
      </div>

      <p style={{ color: "#475569", fontSize: 14, lineHeight: 1.7, marginBottom: 20 }}>{story.description}</p>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px 24px", fontSize: 13, marginBottom: 20 }}>
        {[
          ["Reporter", story.reporter], ["Editor", story.editor],
          ["Format", story.format], ["ETA", fmtDate(story.eta)],
          ["Publish Date", fmtDate(story.publishDate)], ["Issue", story.issueMonth || "—"],
          ["SEO Keyword", story.seoKeyword || "—"], ["Traffic Potential", story.trafficPotential],
          ["Sponsorship", story.sponsorship], ["Created", fmtDate(story.createdAt)],
        ].map(([k, v]) => (
          <div key={k}>
            <div style={{ color: "#94a3b8", fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 2 }}>{k}</div>
            <div style={{ color: "#1e293b", fontWeight: 500 }}>{v}</div>
          </div>
        ))}
      </div>

      {story.notes && (
        <div style={{ background: "#fffbeb", border: "1px solid #fde68a", borderRadius: 8, padding: "10px 14px", marginBottom: 16, fontSize: 13, color: "#92400e" }}>
          📝 {story.notes}
        </div>
      )}

      {days !== null && !["Published", "Hold/Dropped"].includes(story.status) && (
        <div style={{ background: overdue ? "#fef2f2" : days <= 3 ? "#fff7ed" : "#f0fdf4", border: `1px solid ${overdue ? "#fecaca" : days <= 3 ? "#fed7aa" : "#bbf7d0"}`, borderRadius: 8, padding: "10px 14px", marginBottom: 16, fontSize: 13, color: overdue ? "#991b1b" : days <= 3 ? "#9a3412" : "#166534" }}>
          {overdue ? `⚡ Overdue by ${Math.abs(days)} day${Math.abs(days) !== 1 ? "s" : ""}` : `🗓 ${days} day${days !== 1 ? "s" : ""} until deadline`}
        </div>
      )}

      {(userRole === "editor" || userRole === "admin") && (
        <div style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 8 }}>Quick Status Change</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            {STATUSES.map(s => (
              <button key={s} onClick={() => onStatusChange(story.id, s)}
                style={{ padding: "4px 12px", borderRadius: 20, fontSize: 12, cursor: "pointer", border: `1px solid ${STATUS_COLORS[s]}44`, background: story.status === s ? STATUS_COLORS[s] : STATUS_COLORS[s] + "15", color: story.status === s ? "#fff" : STATUS_COLORS[s], fontWeight: 500, transition: "all 0.15s" }}>
                {s}
              </button>
            ))}
          </div>
        </div>
      )}

      <div style={{ borderTop: "1px solid #f1f5f9", paddingTop: 16, marginBottom: 16 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 12 }}>Discussion ({comments.length})</div>
        {comments.map(c => (
          <div key={c.id} style={{ background: "#f8fafc", borderRadius: 8, padding: "10px 12px", marginBottom: 8, fontSize: 13 }}>
            <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 4 }}>
              <span style={{ fontWeight: 700, color: "#1e293b" }}>{c.author}</span>
              <span style={{ color: "#94a3b8", fontSize: 11 }}>{new Date(c.ts).toLocaleString("en-IN")}</span>
            </div>
            <p style={{ margin: 0, color: "#475569", lineHeight: 1.6 }}>{c.text}</p>
          </div>
        ))}
        <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
          <input value={comment} onChange={e => setComment(e.target.value)}
            onKeyDown={e => e.key === "Enter" && addComment()}
            placeholder="Add a comment..." style={{ flex: 1, padding: "8px 12px", borderRadius: 8, border: "1px solid #e2e8f0", fontSize: 13, outline: "none" }} />
          <button onClick={addComment} style={{ padding: "8px 16px", background: FORBES_RED, color: "#fff", border: "none", borderRadius: 8, cursor: "pointer", fontSize: 13, fontWeight: 600 }}>Post</button>
        </div>
      </div>

      {(userRole === "editor" || userRole === "admin") && (
        <div style={{ display: "flex", gap: 10, borderTop: "1px solid #f1f5f9", paddingTop: 16 }}>
          <button onClick={() => onEdit(story)} style={{ flex: 1, padding: "9px 0", background: "#1e293b", color: "#fff", border: "none", borderRadius: 8, cursor: "pointer", fontSize: 13, fontWeight: 600 }}>Edit Story</button>
          <button onClick={() => onDelete(story.id)} style={{ padding: "9px 20px", background: "#fef2f2", color: "#dc2626", border: "1px solid #fecaca", borderRadius: 8, cursor: "pointer", fontSize: 13, fontWeight: 600 }}>Delete</button>
        </div>
      )}
    </div>
  );
}

// ─── TABLE VIEW ───────────────────────────────────────────────────────────────

function TableView({ stories, onRowClick, sortKey, setSortKey, sortDir, setSortDir }) {
  const cols = [
    { key: "title", label: "Title", w: "28%" },
    { key: "reporter", label: "Reporter", w: "12%" },
    { key: "desk", label: "Desk", w: "10%" },
    { key: "status", label: "Status", w: "14%" },
    { key: "priority", label: "Priority", w: "10%" },
    { key: "pubType", label: "Type", w: "8%" },
    { key: "eta", label: "ETA", w: "10%" },
  ];

  const toggleSort = (k) => {
    if (sortKey === k) setSortDir(d => d === "asc" ? "desc" : "asc");
    else { setSortKey(k); setSortDir("asc"); }
  };

  return (
    <div style={{ overflowX: "auto" }}>
      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
        <thead>
          <tr style={{ background: "#f8fafc" }}>
            {cols.map(c => (
              <th key={c.key} onClick={() => toggleSort(c.key)}
                style={{ width: c.w, padding: "10px 14px", textAlign: "left", fontSize: 11, fontWeight: 700, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.05em", cursor: "pointer", borderBottom: "1px solid #e2e8f0", whiteSpace: "nowrap", userSelect: "none" }}>
                {c.label} {sortKey === c.key ? (sortDir === "asc" ? "↑" : "↓") : ""}
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {stories.map((s, i) => {
            const overdue = isOverdue(s);
            return (
              <tr key={s.id} onClick={() => onRowClick(s)}
                style={{ background: overdue ? "#fff5f5" : i % 2 === 0 ? "#fff" : "#fafafa", cursor: "pointer", borderBottom: "1px solid #f1f5f9", transition: "background 0.12s" }}
                onMouseEnter={e => e.currentTarget.style.background = "#f0f9ff"}
                onMouseLeave={e => e.currentTarget.style.background = overdue ? "#fff5f5" : i % 2 === 0 ? "#fff" : "#fafafa"}>
                <td style={{ padding: "12px 14px" }}>
                  <div style={{ fontWeight: 600, color: "#1e293b", marginBottom: 2 }}>{s.title}</div>
                  {overdue && <span style={{ fontSize: 10, color: "#ef4444", fontWeight: 700 }}>⚠ OVERDUE</span>}
                </td>
                <td style={{ padding: "12px 14px", color: "#475569" }}>{s.reporter.split(" ")[0]}</td>
                <td style={{ padding: "12px 14px" }}><Badge label={s.desk} color="#6366f1" small /></td>
                <td style={{ padding: "12px 14px" }}><StatusBadge status={s.status} small /></td>
                <td style={{ padding: "12px 14px" }}><PriorityBadge priority={s.priority} small /></td>
                <td style={{ padding: "12px 14px" }}><Badge label={s.pubType} color="#0ea5e9" small /></td>
                <td style={{ padding: "12px 14px", color: overdue ? "#dc2626" : "#64748b", fontWeight: overdue ? 700 : 400 }}>{fmtDate(s.eta)}</td>
              </tr>

        </tbody>
      </table>
      {stories.length === 0 && (
        <div style={{ textAlign: "center", padding: "60px 0", color: "#94a3b8" }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>📭</div>
          <div style={{ fontWeight: 600 }}>No stories match your filters</div>
        </div>

  );
}

// ─── CALENDAR VIEW ────────────────────────────────────────────────────────────

function CalendarView({ stories, onStoryClick }) {
  const today = new Date();
  const [month, setMonth] = useState(today.getMonth());
  const [year, setYear] = useState(today.getFullYear());

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const MONTHS = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

  const byDay = {};
  stories.forEach(s => {
    const d = s.publishDate || s.eta;
    if (!d) return;
    const dt = new Date(d);
    if (dt.getMonth() === month && dt.getFullYear() === year) {
      const k = dt.getDate();
      byDay[k] = byDay[k] || [];
      byDay[k].push(s);
    }
  });

  const cells = [];
  for (let i = 0; i < firstDay; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 }}>
        <button onClick={() => { if (month === 0) { setMonth(11); setYear(y => y - 1); } else setMonth(m => m - 1); }}
          style={{ padding: "6px 14px", background: "#f8fafc", border: "1px solid #e2e8f0", borderRadius: 8, cursor: "pointer", fontSize: 16 }}>‹</button>
        <h3 style={{ margin: 0, fontSize: 18, fontWeight: 700, color: "#1e293b" }}>{MONTHS[month]} {year}</h3>
        <button onClick={() => { if (month === 11) { setMonth(0); setYear(y => y + 1); } else setMonth(m => m + 1); }}
          style={{ padding: "6px 14px", background: "#f8fafc", border: "1px solid #e2e8f0", borderRadius: 8, cursor: "pointer", fontSize: 16 }}>›</button>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4, marginBottom: 4 }}>
        {["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"].map(d => (
          <div key={d} style={{ textAlign: "center", fontSize: 11, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", padding: "6px 0" }}>{d}</div>
        ))}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4 }}>
        {cells.map((day, i) => {
          const isToday = day === today.getDate() && month === today.getMonth() && year === today.getFullYear();
          const dayStories = day ? (byDay[day] || []) : [];
          return (
            <div key={i} style={{ minHeight: 100, background: day ? "#fff" : "transparent", borderRadius: 8, border: day ? `1px solid ${isToday ? FORBES_RED : "#e2e8f0"}` : "none", padding: day ? "6px" : 0 }}>
              {day && (
                <>
                  <div style={{ fontSize: 13, fontWeight: isToday ? 800 : 500, color: isToday ? FORBES_RED : "#1e293b", marginBottom: 4, width: 24, height: 24, borderRadius: "50%", background: isToday ? FORBES_RED + "15" : "transparent", display: "flex", alignItems: "center", justifyContent: "center" }}>{day}</div>
                  {dayStories.slice(0, 3).map(s => (
                    <div key={s.id} onClick={() => onStoryClick(s)}
                      style={{ background: STATUS_COLORS[s.status] + "22", color: STATUS_COLORS[s.status], fontSize: 10, padding: "2px 5px", borderRadius: 4, marginBottom: 2, cursor: "pointer", fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                      {s.title}
                    </div>
                  ))}
                  {dayStories.length > 3 && <div style={{ fontSize: 10, color: "#94a3b8" }}>+{dayStories.length - 3} more</div>}
                </>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── MEETING MODE ─────────────────────────────────────────────────────────────

function MeetingMode({ stories, onClose, onStatusChange }) {
  const [idx, setIdx] = useState(0);
  const queue = stories.filter(s => ["Idea Proposed", "Approved", "Assigned"].includes(s.status));
  const s = queue[idx];

  if (!s) return (
    <div style={{ textAlign: "center", padding: "60px 0" }}>
      <div style={{ fontSize: 48, marginBottom: 16 }}>✅</div>
      <h3 style={{ color: "#1e293b" }}>All stories reviewed!</h3>
      <button onClick={onClose} style={{ marginTop: 16, padding: "10px 32px", background: FORBES_RED, color: "#fff", border: "none", borderRadius: 8, cursor: "pointer", fontWeight: 700 }}>Exit Meeting Mode</button>
    </div>
  );

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
        <div style={{ fontSize: 13, color: "#94a3b8" }}>Story {idx + 1} of {queue.length}</div>
        <div style={{ flex: 1, height: 4, background: "#f1f5f9", borderRadius: 4, margin: "0 20px" }}>
          <div style={{ height: "100%", background: FORBES_RED, borderRadius: 4, width: `${((idx + 1) / queue.length) * 100}%`, transition: "width 0.3s" }}></div>
        </div>
        <button onClick={onClose} style={{ padding: "6px 14px", background: "#f1f5f9", border: "none", borderRadius: 8, cursor: "pointer", fontSize: 13, color: "#64748b" }}>Exit</button>
      </div>

      <div style={{ background: "#fff", borderRadius: 16, border: "1px solid #e2e8f0", padding: "28px", marginBottom: 20 }}>
        <div style={{ display: "flex", gap: 10, marginBottom: 12 }}>
          <Badge label={s.desk} color="#6366f1" />
          <Badge label={s.pubType} color="#0ea5e9" />
          <PriorityBadge priority={s.priority} />
        </div>
        <h2 style={{ margin: "0 0 12px", fontSize: 24, fontWeight: 800, color: "#1e293b" }}>{s.title}</h2>
        <p style={{ color: "#475569", fontSize: 15, lineHeight: 1.7, marginBottom: 20 }}>{s.description}</p>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 16 }}>
          {[["Reporter", s.reporter], ["Editor", s.editor], ["Format", s.format], ["ETA", fmtDate(s.eta)]].map(([k, v]) => (
            <div key={k}>
              <div style={{ fontSize: 11, color: "#94a3b8", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 4 }}>{k}</div>
              <div style={{ fontSize: 14, fontWeight: 600, color: "#1e293b" }}>{v}</div>
            </div>
          ))}
        </div>
        {s.notes && <div style={{ marginTop: 16, background: "#fffbeb", borderRadius: 8, padding: "10px 14px", fontSize: 13, color: "#92400e" }}>📝 {s.notes}</div>}
      </div>

      <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 20 }}>
        {["Approved", "Assigned", "Hold/Dropped"].map(action => (
          <button key={action} onClick={() => { onStatusChange(s.id, action); setIdx(i => Math.min(i, queue.length - 2)); }}
            style={{ flex: 1, minWidth: 120, padding: "12px 0", border: "none", borderRadius: 10, cursor: "pointer", fontWeight: 700, fontSize: 14, background: action === "Approved" ? "#22c55e" : action === "Assigned" ? "#0ea5e9" : "#f1f5f9", color: action === "Hold/Dropped" ? "#94a3b8" : "#fff" }}>
            {action === "Approved" ? "✓ Approve" : action === "Assigned" ? "→ Assign" : "✕ Hold"}
          </button>
        ))}
        <button onClick={() => setIdx(i => Math.min(i + 1, queue.length - 1))}
          style={{ padding: "12px 20px", background: "#f8fafc", border: "1px solid #e2e8f0", borderRadius: 10, cursor: "pointer", fontWeight: 600, fontSize: 14, color: "#64748b" }}>Skip →</button>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────

function App() {
  const [stories, setStories] = useState(SEED_STORIES);
  const [view, setView] = useState("table");
  const [showForm, setShowForm] = useState(false);
  const [editingStory, setEditingStory] = useState(null);
  const [selectedStory, setSelectedStory] = useState(null);
  const [search, setSearch] = useState("");
  const [filterDesk, setFilterDesk] = useState("All");
  const [filterStatus, setFilterStatus] = useState("All");
  const [filterPriority, setFilterPriority] = useState("All");
  const [filterPubType, setFilterPubType] = useState("All");
  const [sortKey, setSortKey] = useState("eta");
  const [sortDir, setSortDir] = useState("asc");
  const [userRole, setUserRole] = useState("admin");
  const [darkMode, setDarkMode] = useState(false);
  const [showMeeting, setShowMeeting] = useState(false);
  const [syncStatus, setSyncStatus] = useState("synced");
  const [sidebarOpen, setSidebarOpen] = useState(true);

  const filteredStories = useMemo(() => {
    let s = [...stories];
    if (search) s = s.filter(x => x.title.toLowerCase().includes(search.toLowerCase()) || x.reporter.toLowerCase().includes(search.toLowerCase()) || x.desk.toLowerCase().includes(search.toLowerCase()));
    if (filterDesk !== "All") s = s.filter(x => x.desk === filterDesk);
    if (filterStatus !== "All") s = s.filter(x => x.status === filterStatus);
    if (filterPriority !== "All") s = s.filter(x => x.priority === filterPriority);
    if (filterPubType !== "All") s = s.filter(x => x.pubType === filterPubType);
    s.sort((a, b) => {
      let va = a[sortKey] || "", vb = b[sortKey] || "";
      if (sortKey === "priority") { const o = { Critical: 0, High: 1, Medium: 2, Low: 3 }; va = o[va]; vb = o[vb]; }
      return sortDir === "asc" ? (va < vb ? -1 : 1) : (va > vb ? -1 : 1);
    });
    return s;
  }, [stories, search, filterDesk, filterStatus, filterPriority, filterPubType, sortKey, sortDir]);

  const simulate_sheets_save = () => {
    setSyncStatus("saving");
    setTimeout(() => setSyncStatus("synced"), 1200);
  };

  const handleSubmit = useCallback((form) => {
    if (editingStory) {
      setStories(s => s.map(x => x.id === editingStory.id ? { ...x, ...form } : x));
    } else {
      setStories(s => [...s, { ...form, id: Date.now(), comments: [], createdAt: new Date().toISOString().split("T")[0] }]);
    }
    setShowForm(false);
    setEditingStory(null);
    simulate_sheets_save();
  }, [editingStory]);

  const handleDelete = useCallback((id) => {
    setStories(s => s.filter(x => x.id !== id));
    setSelectedStory(null);
    simulate_sheets_save();
  }, []);

  const handleStatusChange = useCallback((id, status) => {
    setStories(s => s.map(x => x.id === id ? { ...x, status } : x));
    if (selectedStory?.id === id) setSelectedStory(prev => ({ ...prev, status }));
    simulate_sheets_save();
  }, [selectedStory]);

  const overdueCount = stories.filter(isOverdue).length;
  const bg = darkMode ? "#0f172a" : "#f8fafc";
  const cardBg = darkMode ? "#1e293b" : "#fff";
  const textPrimary = darkMode ? "#f1f5f9" : "#1e293b";
  const textSecondary = darkMode ? "#94a3b8" : "#64748b";
  const borderColor = darkMode ? "#334155" : "#e2e8f0";

  const VIEWS = [
    { id: "analytics", label: "Dashboard", icon: "📊" },
    { id: "table", label: "Table View", icon: "📋" },
    { id: "kanban", label: "Kanban Board", icon: "🗂" },
    { id: "calendar", label: "Calendar", icon: "📅" },
  ];

  return (
    <div style={{ display: "flex", minHeight: "100vh", background: bg, fontFamily: "'DM Sans', 'Helvetica Neue', Arial, sans-serif", color: textPrimary }}>

      {/* Sidebar */}
      <div style={{ width: sidebarOpen ? 240 : 60, background: darkMode ? "#0c1628" : "#1a1a2e", transition: "width 0.25s", flexShrink: 0, display: "flex", flexDirection: "column", position: "sticky", top: 0, height: "100vh", overflowY: "auto", zIndex: 50 }}>
        <div style={{ padding: "20px 16px", borderBottom: `1px solid rgba(255,255,255,0.08)` }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ width: 36, height: 36, background: FORBES_RED, borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
              <span style={{ color: "#fff", fontWeight: 900, fontSize: 14, letterSpacing: "-0.5px" }}>F</span>
            </div>
            {sidebarOpen && (
              <div>
                <div style={{ color: "#fff", fontWeight: 800, fontSize: 15, letterSpacing: "-0.5px" }}>Forbes India</div>
                <div style={{ color: "#64748b", fontSize: 11 }}>Editorial Workflow</div>
              </div>
            )}
          </div>
        </div>

        <nav style={{ padding: "16px 8px", flex: 1 }}>
          {VIEWS.map(v => (
            <button key={v.id} onClick={() => setView(v.id)}
              style={{ width: "100%", display: "flex", alignItems: "center", gap: 12, padding: "10px 12px", borderRadius: 8, border: "none", cursor: "pointer", marginBottom: 2, background: view === v.id ? "rgba(200,16,46,0.2)" : "transparent", color: view === v.id ? "#f87171" : "#94a3b8", textAlign: "left", transition: "all 0.15s", fontSize: 14, fontWeight: view === v.id ? 700 : 400 }}>
              <span style={{ fontSize: 16, flexShrink: 0 }}>{v.icon}</span>
              {sidebarOpen && v.label}
            </button>
          ))}

          {sidebarOpen && (
            <div style={{ marginTop: 20, padding: "0 4px" }}>
              <div style={{ fontSize: 10, color: "#475569", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 8 }}>Quick Filters</div>
              {DESKS.slice(0, 6).map(d => (
                <button key={d} onClick={() => setFilterDesk(filterDesk === d ? "All" : d)}
                  style={{ width: "100%", textAlign: "left", padding: "6px 10px", borderRadius: 6, border: "none", cursor: "pointer", background: filterDesk === d ? "rgba(99,102,241,0.15)" : "transparent", color: filterDesk === d ? "#818cf8" : "#64748b", fontSize: 13, marginBottom: 1 }}>
                  {d}
                </button>
              ))}
            </div>
          )}
        </nav>

        <div style={{ padding: "16px 8px", borderTop: `1px solid rgba(255,255,255,0.06)` }}>
          {sidebarOpen && (
            <div style={{ padding: "10px 12px", background: "rgba(255,255,255,0.04)", borderRadius: 8, marginBottom: 10 }}>
              <div style={{ fontSize: 10, color: "#64748b", fontWeight: 700, textTransform: "uppercase", marginBottom: 6 }}>Role</div>
              <select value={userRole} onChange={e => setUserRole(e.target.value)}
                style={{ width: "100%", background: "transparent", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 6, color: "#94a3b8", padding: "4px 8px", fontSize: 12 }}>
                {ROLES.map(r => <option key={r} value={r} style={{ background: "#1a1a2e" }}>{r.charAt(0).toUpperCase() + r.slice(1)}</option>)}
              </select>
            </div>
          )}
          <button onClick={() => setSidebarOpen(o => !o)}
            style={{ width: "100%", padding: "8px 12px", background: "transparent", border: "none", color: "#64748b", cursor: "pointer", textAlign: "center", fontSize: 16 }}>
            {sidebarOpen ? "←" : "→"}
          </button>
        </div>
      </div>

      {/* Main content */}
      <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0 }}>

        {/* Top bar */}
        <div style={{ background: cardBg, borderBottom: `1px solid ${borderColor}`, padding: "14px 24px", display: "flex", alignItems: "center", gap: 12, position: "sticky", top: 0, zIndex: 40 }}>
          <div style={{ flex: 1 }}>
            <h1 style={{ margin: 0, fontSize: 20, fontWeight: 800, color: textPrimary }}>
              {VIEWS.find(v => v.id === view)?.label}
            </h1>
            <div style={{ fontSize: 12, color: textSecondary, marginTop: 2 }}>
              {filteredStories.length} stories · {overdueCount > 0 && <span style={{ color: "#ef4444", fontWeight: 700 }}>⚠ {overdueCount} overdue</span>}
            </div>
          </div>

          <div style={{ display: "flex", alignItems: "center", gap: 8, background: darkMode ? "#0f172a" : "#f1f5f9", borderRadius: 8, padding: "6px 12px" }}>
            <span style={{ fontSize: 14, color: textSecondary }}>🔍</span>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search stories..."
              style={{ border: "none", background: "transparent", outline: "none", fontSize: 13, color: textPrimary, width: 180 }} />
          </div>

          <div style={{ display: "flex", gap: 6 }}>
            {[["All", filterDesk, setFilterDesk, DESKS, "Desk"], ["All", filterStatus, setFilterStatus, STATUSES, "Status"], ["All", filterPriority, setFilterPriority, PRIORITIES, "Priority"]].map(([def, val, setter, opts, lbl]) => (
              <select key={lbl} value={val} onChange={e => setter(e.target.value)}
                style={{ padding: "6px 10px", borderRadius: 8, border: `1px solid ${borderColor}`, background: darkMode ? "#1e293b" : "#f8fafc", color: textSecondary, fontSize: 12, cursor: "pointer" }}>
                <option value="All">All {lbl}s</option>
                {opts.map(o => <option key={o} value={o}>{o}</option>)}
              </select>
            ))}
          </div>

          <button onClick={() => setDarkMode(d => !d)}
            style={{ padding: "7px 12px", background: darkMode ? "#334155" : "#f1f5f9", border: "none", borderRadius: 8, cursor: "pointer", fontSize: 16 }}>
            {darkMode ? "☀️" : "🌙"}
          </button>

          <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "6px 10px", background: syncStatus === "saving" ? "#fffbeb" : "#f0fdf4", borderRadius: 8, fontSize: 12, color: syncStatus === "saving" ? "#92400e" : "#166534" }}>
            {syncStatus === "saving" ? "⏳ Saving..." : "✓ Sheets Synced"}
          </div>

          {(userRole === "editor" || userRole === "admin") && (
            <>
              <button onClick={() => setShowMeeting(true)}
                style={{ padding: "8px 16px", background: "#1e293b", color: "#fff", border: "none", borderRadius: 8, cursor: "pointer", fontSize: 13, fontWeight: 700 }}>
                🎙 Meeting Mode
              </button>
              <button onClick={() => { setEditingStory(null); setShowForm(true); }}
                style={{ padding: "8px 18px", background: FORBES_RED, color: "#fff", border: "none", borderRadius: 8, cursor: "pointer", fontSize: 13, fontWeight: 700, whiteSpace: "nowrap" }}>
                + Add Story
              </button>
            </>
          )}
        </div>

        {/* Content area */}
        <div style={{ flex: 1, padding: "24px", overflowY: "auto" }}>
          {view === "analytics" && <AnalyticsDashboard stories={stories} />}
          {view === "table" && (
            <div style={{ background: cardBg, borderRadius: 12, border: `1px solid ${borderColor}`, overflow: "hidden" }}>
              <TableView stories={filteredStories} onRowClick={setSelectedStory} sortKey={sortKey} setSortKey={setSortKey} sortDir={sortDir} setSortDir={setSortDir} />
            </div>
          )}
          {view === "kanban" && <KanbanView stories={filteredStories} onCardClick={setSelectedStory} onStatusChange={handleStatusChange} />}
          {view === "calendar" && (
            <div style={{ background: cardBg, borderRadius: 12, border: `1px solid ${borderColor}`, padding: 24 }}>
              <CalendarView stories={stories} onStoryClick={setSelectedStory} />
            </div>
          )}
        </div>
      </div>

      {/* Modals */}
      {(showForm || editingStory) && (
        <Modal title={editingStory ? "Edit Story" : "Submit New Story"} onClose={() => { setShowForm(false); setEditingStory(null); }} wide>
          <StoryForm onSubmit={handleSubmit} initial={editingStory} onCancel={() => { setShowForm(false); setEditingStory(null); }} />
        </Modal>
      )}

      {selectedStory && !editingStory && (
        <Modal title={selectedStory.title} onClose={() => setSelectedStory(null)} wide>
          <StoryDetail story={selectedStory} userRole={userRole}
            onEdit={(s) => { setEditingStory(s); setSelectedStory(null); }}
            onDelete={(id) => { handleDelete(id); setSelectedStory(null); }}
            onStatusChange={handleStatusChange}
            onClose={() => setSelectedStory(null)} />
        </Modal>
      )}

      {showMeeting && (
        <Modal title="🎙 Editorial Meeting Mode" onClose={() => setShowMeeting(false)} wide>
          <MeetingMode stories={filteredStories} onClose={() => setShowMeeting(false)} onStatusChange={handleStatusChange} />
        </Modal>
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
