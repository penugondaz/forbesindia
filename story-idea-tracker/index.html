<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Forbes India — Editorial Workflow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.3/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;font-family:'DM Sans',system-ui,sans-serif}
body{background:#f1f5f9;color:#1e293b}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:10px}
::-webkit-scrollbar-track{background:transparent}
.hover-row:hover td{background:#f0f9ff}
.kanban-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.10)!important}
.nav-btn:hover{background:rgba(255,255,255,0.07)!important}
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,0.65);z-index:999;display:flex;align-items:flex-start;justify-content:center;padding:20px 12px;overflow-y:auto}
.modal-box{background:#fff;border-radius:14px;width:100%;max-width:860px;box-shadow:0 32px 80px rgba(0,0,0,0.22);animation:slideUp 0.18s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
input,select,textarea{font-family:inherit}
button{font-family:inherit;cursor:pointer}
.inline-sel{padding:3px 6px;border-radius:6px;border:1px solid #e2e8f0;background:#f8fafc;font-size:11px;color:#475569;font-family:inherit;cursor:pointer}
.inline-sel:focus{outline:none;border-color:#94a3b8}
.chip-btn{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;border:none;cursor:pointer;white-space:nowrap;transition:opacity .15s}
.chip-btn:hover{opacity:.8}
/* Mobile sidebar overlay */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:49}
@media(max-width:768px){
  .sidebar-overlay{display:block}
  .desktop-only{display:none!important}
  .mobile-topbar-title{font-size:15px!important}
  .topbar-filters{display:none!important}
  .mobile-filter-row{display:flex!important}
  .story-table-wrap{overflow-x:auto}
  .story-table td,.story-table th{padding:8px 10px!important;font-size:11px!important}
  .kpi-grid{grid-template-columns:repeat(2,1fr)!important}
  .chart-grid{grid-template-columns:1fr!important}
  .modal-overlay{padding:8px 4px!important;align-items:flex-end}
  .modal-box{border-radius:14px 14px 0 0!important;max-height:92vh;overflow-y:auto}
  .form-grid{grid-template-columns:1fr!important}
  .form-grid>div[style*="1/-1"]{grid-column:1/-1!important}
  .detail-grid{grid-template-columns:1fr 1fr!important}
  .meeting-meta{grid-template-columns:1fr 1fr!important}
}
.mobile-filter-row{display:none;gap:6px;overflow-x:auto;padding:8px 14px;background:#fff;border-bottom:1px solid #e2e8f0}
.mobile-filter-row select{flex-shrink:0;padding:5px 8px;border-radius:7px;border:1px solid #e2e8f0;background:#f8fafc;font-size:11px;color:#475569;font-family:inherit}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;font-size:14px;color:#94a3b8">Loading Forbes India Dashboard...</div></div>

<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useMemo,useCallback} = React;

const RED="#c8102e";
const STATUSES=["Idea Proposed","Approved","Assigned","Researching","Interview Scheduled","Writing","Editing","Fact Check","Design","SEO Review","Scheduled","Published","Hold/Dropped"];
const SC={"Idea Proposed":"#6366f1","Approved":"#0ea5e9","Assigned":"#8b5cf6","Researching":"#f59e0b","Interview Scheduled":"#10b981","Writing":"#3b82f6","Editing":"#f97316","Fact Check":"#ec4899","Design":"#14b8a6","SEO Review":"#84cc16","Scheduled":"#a855f7","Published":"#22c55e","Hold/Dropped":"#94a3b8"};
const DESKS=["Business","Tech","Lifestyle","Markets","Startups","Leadership","ESG","Global","Opinion","Cover Story"];
const FORMATS=["Long-form Feature","News Report","Interview","Opinion/Column","Listicle","Profile","Data Story","Photo Essay","Video Script","Podcast Brief"];
const PRIS=["Critical","High","Medium","Low"];
const PC={"Critical":"#ef4444","High":"#f97316","Medium":"#f59e0b","Low":"#6366f1"};
const REPORTERS=["Priya Nair","Arjun Mehta","Sneha Kapoor","Rahul Sharma","Deepa Iyer","Vikram Bose"];
const EDITORS=["Anand Menon","Shalini Roy","Rajesh Kumar","Meera Pillai"];
const ROLES=["reporter","editor","admin"];

/* Role guide: admin = full access (add/edit/delete/status change)
               editor = add/edit/status change (no delete)
               reporter = read-only + add comments */

const SHEETS_API="https://script.google.com/macros/s/AKfycbyY55bnq6mXy94HfEUQQofUsnIdF2rfCMotMDOVYdcLHjweQBC9NcdLEqvJWMNT8xSV/exec";

async function sheetsApi(action,payload={}){
  try{
    const res=await fetch(SHEETS_API,{method:"POST",body:JSON.stringify({action,...payload})});
    const text=await res.text();
    try{return JSON.parse(text);}catch(e){console.error("Non-JSON:",text);return{error:"Bad response"};}
  }catch(err){console.error("API error:",err);return{error:err.message};}
}

const isOverdue=s=>{if(!s.eta||["Published","Hold/Dropped"].includes(s.status))return false;return new Date(s.eta)<new Date();};
const daysLeft=eta=>Math.ceil((new Date(eta)-new Date())/86400000);
const fmt=d=>d?new Date(d).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"}):"—";

const Badge=({label,color,sm})=>(
  <span style={{display:"inline-flex",alignItems:"center",padding:sm?"2px 7px":"3px 10px",borderRadius:20,fontSize:sm?10:12,fontWeight:600,background:color+"20",color,border:`1px solid ${color}35`,whiteSpace:"nowrap",lineHeight:1.4}}>{label}</span>
);
const SBadge=({s,sm})=><Badge label={s} color={SC[s]||"#888"} sm={sm}/>;
const PBadge=({p,sm})=><Badge label={p} color={PC[p]||"#888"} sm={sm}/>;

function ChartBox({type,data,options,height=220}){
  const ref=useRef(null);const inst=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    if(inst.current)inst.current.destroy();
    inst.current=new Chart(ref.current,{type,data,options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},...options}});
    return()=>{if(inst.current)inst.current.destroy();};
  },[JSON.stringify(data)]);
  return <div style={{position:"relative",height}}><canvas ref={ref}/></div>;
}

function Modal({title,children,onClose,wide}){
  return(
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal-box" style={{maxWidth:wide?860:640}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 20px",borderBottom:"1px solid #f1f5f9",position:"sticky",top:0,background:"#fff",zIndex:2,borderRadius:"14px 14px 0 0"}}>
          <h3 style={{fontSize:16,fontWeight:700,color:"#1e293b",lineHeight:1.3,flex:1,paddingRight:8}}>{title}</h3>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,color:"#94a3b8",lineHeight:1,padding:"0 4px",flexShrink:0}}>×</button>
        </div>
        <div style={{padding:"18px 20px"}}>{children}</div>
      </div>
    </div>
  );
}

const EF={title:"",desc:"",reporter:REPORTERS[0],editor:EDITORS[0],desk:DESKS[0],format:FORMATS[0],pub:"Web",pri:"Medium",status:"Idea Proposed",eta:"",pubDate:"",issue:"",seo:"",traffic:"Medium",sponsor:"No",notes:"",refs:""};
function StoryForm({onSubmit,init,onCancel}){
  const [f,setF]=useState(init||EF);
  const set=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  const I={width:"100%",padding:"8px 11px",borderRadius:7,border:"1px solid #e2e8f0",background:"#f8fafc",fontSize:13,color:"#1e293b",outline:"none",fontFamily:"inherit"};
  const L={fontSize:11,fontWeight:700,color:"#64748b",marginBottom:3,display:"block",textTransform:"uppercase",letterSpacing:"0.06em"};
  const F={marginBottom:12};
  return(
    <div>
      <div className="form-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}}>
        <div style={{...F,gridColumn:"1/-1"}}><label style={L}>Story Title *</label><input style={{...I,fontSize:14,fontWeight:600}} value={f.title} onChange={set("title")} placeholder="Enter story title..."/></div>
        <div style={{...F,gridColumn:"1/-1"}}><label style={L}>Description / Pitch</label><textarea style={{...I,minHeight:70,resize:"vertical"}} value={f.desc} onChange={set("desc")} placeholder="Story angle, key sources, why it matters now..."/></div>
        {[["Reporter","reporter",REPORTERS],["Editor","editor",EDITORS]].map(([l,k,o])=>(
          <div key={k} style={F}><label style={L}>{l}</label><select style={I} value={f[k]} onChange={set(k)}>{o.map(x=><option key={x}>{x}</option>)}</select></div>
        ))}
        {[["Desk","desk",DESKS],["Format","format",FORMATS]].map(([l,k,o])=>(
          <div key={k} style={F}><label style={L}>{l}</label><select style={I} value={f[k]} onChange={set(k)}>{o.map(x=><option key={x}>{x}</option>)}</select></div>
        ))}
        <div style={F}><label style={L}>Publication Type</label><select style={I} value={f.pub} onChange={set("pub")}>{["Web","Magazine","Both"].map(x=><option key={x}>{x}</option>)}</select></div>
        <div style={F}><label style={L}>Priority</label><select style={I} value={f.pri} onChange={set("pri")}>{PRIS.map(x=><option key={x}>{x}</option>)}</select></div>
        <div style={F}><label style={L}>Status</label><select style={I} value={f.status} onChange={set("status")}>{STATUSES.map(x=><option key={x}>{x}</option>)}</select></div>
        <div style={F}><label style={L}>ETA / Deadline</label><input type="date" style={I} value={f.eta} onChange={set("eta")}/></div>
        <div style={F}><label style={L}>Publish Date</label><input type="date" style={I} value={f.pubDate} onChange={set("pubDate")}/></div>
        <div style={F}><label style={L}>Magazine Issue</label><input style={I} value={f.issue} onChange={set("issue")} placeholder="e.g. June 2026"/></div>
        <div style={F}><label style={L}>SEO Keyword</label><input style={I} value={f.seo} onChange={set("seo")} placeholder="Primary keyword..."/></div>
        <div style={F}><label style={L}>Traffic Potential</label><select style={I} value={f.traffic} onChange={set("traffic")}>{["Very High","High","Medium","Low"].map(x=><option key={x}>{x}</option>)}</select></div>
        <div style={F}><label style={L}>Sponsorship</label><select style={I} value={f.sponsor} onChange={set("sponsor")}>{["Yes","No","Under Discussion"].map(x=><option key={x}>{x}</option>)}</select></div>
        <div style={{...F,gridColumn:"1/-1"}}><label style={L}>Notes</label><textarea style={{...I,minHeight:50,resize:"vertical"}} value={f.notes} onChange={set("notes")} placeholder="Additional notes..."/></div>
        <div style={{...F,gridColumn:"1/-1"}}><label style={L}>Reference Links</label><input style={I} value={f.refs} onChange={set("refs")} placeholder="https://..."/></div>
      </div>
      <div style={{display:"flex",gap:10,marginTop:8}}>
        <button onClick={()=>{if(f.title.trim())onSubmit(f);}} style={{flex:1,padding:"10px 0",background:RED,color:"#fff",border:"none",borderRadius:8,fontWeight:700,fontSize:13}}>{init?"Update Story":"Submit Story"}</button>
        <button onClick={onCancel} style={{padding:"10px 20px",background:"#f1f5f9",color:"#64748b",border:"none",borderRadius:8,fontWeight:600,fontSize:13}}>Cancel</button>
      </div>
    </div>
  );
}

/* ── STORY DETAIL with prev/next arrows + comment saving ── */
function StoryDetail({story,role,onEdit,onDelete,onStatus,onFieldChange,onPrev,onNext,hasPrev,hasNext,onSaveComment}){
  const [c,setC]=useState("");
  const [comments,setComments]=useState(story.comments||[]);
  const ov=isOverdue(story);
  const dl=story.eta?daysLeft(story.eta):null;

  useEffect(()=>{ setComments(story.comments||[]); },[story.id]);

  const addC=()=>{
    if(!c.trim())return;
    const newC={id:Date.now(),text:c,author:"You",ts:new Date().toISOString()};
    const updated=[...comments,newC];
    setComments(updated);
    onSaveComment(story.id,updated);
    setC("");
  };

  const IS={padding:"3px 6px",borderRadius:6,border:"1px solid #e2e8f0",background:"#f8fafc",fontSize:12,color:"#475569",fontFamily:"inherit",width:"100%"};

  return(
    <div>
      {/* Prev/Next navigation */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,gap:8}}>
        <button onClick={onPrev} disabled={!hasPrev} style={{padding:"5px 14px",borderRadius:7,border:"1px solid #e2e8f0",background:hasPrev?"#f8fafc":"#f1f5f9",color:hasPrev?"#475569":"#cbd5e1",fontWeight:700,fontSize:13,cursor:hasPrev?"pointer":"default"}}>← Prev</button>
        <div style={{display:"flex",flexWrap:"wrap",gap:5,justifyContent:"center"}}>
          <SBadge s={story.status}/><PBadge p={story.pri}/>
          <Badge label={story.desk} color="#64748b" sm/>
          {ov&&<Badge label="⚠ OVERDUE" color="#ef4444" sm/>}
        </div>
        <button onClick={onNext} disabled={!hasNext} style={{padding:"5px 14px",borderRadius:7,border:"1px solid #e2e8f0",background:hasNext?"#f8fafc":"#f1f5f9",color:hasNext?"#475569":"#cbd5e1",fontWeight:700,fontSize:13,cursor:hasNext?"pointer":"default"}}>Next →</button>
      </div>

      <p style={{color:"#475569",fontSize:13,lineHeight:1.7,marginBottom:14}}>{story.desc}</p>

      {/* Inline editable fields */}
      {(role==="editor"||role==="admin")&&(
        <div style={{background:"#f8fafc",borderRadius:10,border:"1px solid #e2e8f0",padding:"12px 14px",marginBottom:14}}>
          <div style={{fontSize:10,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>Quick Edit</div>
          <div className="detail-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px 12px"}}>
            {[
              ["Status","status",STATUSES],
              ["Reporter","reporter",REPORTERS],
              ["Priority","pri",PRIS],
              ["Type","pub",["Web","Magazine","Both"]],
            ].map(([lbl,key,opts])=>(
              <div key={key}>
                <div style={{fontSize:10,color:"#94a3b8",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:3}}>{lbl}</div>
                <select value={story[key]||""} onChange={e=>onFieldChange(story.id,key,e.target.value)} style={IS}>
                  {opts.map(o=><option key={o}>{o}</option>)}
                </select>
              </div>
            ))}
            <div>
              <div style={{fontSize:10,color:"#94a3b8",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:3}}>ETA</div>
              <input type="date" value={story.eta||""} onChange={e=>onFieldChange(story.id,"eta",e.target.value)} style={IS}/>
            </div>
          </div>
        </div>
      )}

      {dl!==null&&!["Published","Hold/Dropped"].includes(story.status)&&(
        <div style={{background:ov?"#fef2f2":dl<=3?"#fff7ed":"#f0fdf4",border:`1px solid ${ov?"#fecaca":dl<=3?"#fed7aa":"#bbf7d0"}`,borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12,color:ov?"#991b1b":dl<=3?"#9a3412":"#166534"}}>
          {ov?`⚡ Overdue by ${Math.abs(dl)} day${Math.abs(dl)!==1?"s":""}`:`🗓 ${dl} day${dl!==1?"s":""} until deadline`}
        </div>
      )}

      <div className="detail-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px 16px",fontSize:12,marginBottom:14}}>
        {[["Editor",story.editor],["Format",story.format],["Publish Date",fmt(story.pubDate)],["Issue",story.issue||"—"],["SEO Keyword",story.seo||"—"],["Traffic",story.traffic],["Sponsorship",story.sponsor],["Created",fmt(story.created)]].map(([k,v])=>(
          <div key={k}><div style={{fontSize:10,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:1}}>{k}</div><div style={{fontWeight:600,color:"#1e293b"}}>{v}</div></div>
        ))}
      </div>

      {story.notes&&<div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#92400e"}}>📝 {story.notes}</div>}

      {/* Comments — saved to Sheets */}
      <div style={{borderTop:"1px solid #f1f5f9",paddingTop:12,marginBottom:12}}>
        <div style={{fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8}}>Comments ({comments.length})</div>
        {comments.map(x=>(
          <div key={x.id} style={{background:"#f8fafc",borderRadius:7,padding:"8px 10px",marginBottom:5,fontSize:12}}>
            <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:2}}>
              <span style={{fontWeight:700,color:"#1e293b"}}>{x.author}</span>
              <span style={{color:"#94a3b8",fontSize:10}}>{new Date(x.ts).toLocaleString("en-IN")}</span>
            </div>
            <p style={{margin:0,color:"#475569",lineHeight:1.6}}>{x.text}</p>
          </div>
        ))}
        <div style={{display:"flex",gap:7,marginTop:6}}>
          <input value={c} onChange={e=>setC(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addC()} placeholder="Add a comment and press Enter…" style={{flex:1,padding:"7px 10px",borderRadius:7,border:"1px solid #e2e8f0",fontSize:12,outline:"none",fontFamily:"inherit"}}/>
          <button onClick={addC} style={{padding:"7px 14px",background:RED,color:"#fff",border:"none",borderRadius:7,fontWeight:600,fontSize:12}}>Post</button>
        </div>
      </div>

      {(role==="editor"||role==="admin")&&(
        <div style={{display:"flex",gap:8,borderTop:"1px solid #f1f5f9",paddingTop:12}}>
          <button onClick={()=>onEdit(story)} style={{flex:1,padding:"8px 0",background:"#1e293b",color:"#fff",border:"none",borderRadius:8,fontSize:12,fontWeight:700}}>✎ Full Edit</button>
          {role==="admin"&&<button onClick={()=>onDelete(story.id)} style={{padding:"8px 16px",background:"#fef2f2",color:"#dc2626",border:"1px solid #fecaca",borderRadius:8,fontSize:12,fontWeight:600}}>Delete</button>}
        </div>
      )}
    </div>
  );
}

/* ── TABLE VIEW with inline editing ── */
function TableView({stories,onRow,sk,setSk,sd,setSd,role,onFieldChange,onDelete,meetingIds,toggleMeeting}){
  const COLS=[{k:"title",l:"Title",w:"22%"},{k:"reporter",l:"Reporter",w:"10%"},{k:"desk",l:"Desk",w:"9%"},{k:"status",l:"Status",w:"12%"},{k:"pri",l:"Priority",w:"9%"},{k:"pub",l:"Type",w:"7%"},{k:"eta",l:"ETA",w:"9%"},{k:"_actions",l:"",w:"14%"}];
  const sort=k=>{if(k==="_actions")return;if(sk===k)setSd(d=>d==="asc"?"desc":"asc");else{setSk(k);setSd("asc");}};
  const canEdit=role==="editor"||role==="admin";
  const IS={padding:"2px 5px",borderRadius:5,border:"1px solid #e2e8f0",background:"#f8fafc",fontSize:10,color:"#475569",fontFamily:"inherit",maxWidth:"100%"};
  return(
    <div className="story-table-wrap" style={{overflowX:"auto"}}>
      <table className="story-table" style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
        <thead><tr style={{background:"#f8fafc"}}>
          <th style={{width:32,padding:"8px 8px",borderBottom:"2px solid #e2e8f0"}}>
            <span title="Add to Meeting" style={{fontSize:10,color:"#94a3b8",fontWeight:700}}>MTG</span>
          </th>
          {COLS.map(c=>(
            <th key={c.k} onClick={()=>sort(c.k)} style={{width:c.w,padding:"8px 10px",textAlign:"left",fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.05em",cursor:c.k!=="_actions"?"pointer":"default",borderBottom:"2px solid #e2e8f0",whiteSpace:"nowrap",userSelect:"none"}}>
              {c.l}{sk===c.k?(sd==="asc"?" ↑":" ↓"):""}
            </th>
          ))}
        </tr></thead>
        <tbody>
          {stories.map((s,i)=>{
            const ov=isOverdue(s);
            const inMtg=meetingIds.has(s.id);
            return(
              <tr key={s.id} className="hover-row" style={{background:ov?"#fff5f5":i%2?"#fafafa":"#fff",borderBottom:"1px solid #f1f5f9"}}>
                <td style={{padding:"8px 8px",textAlign:"center"}}>
                  <input type="checkbox" checked={inMtg} onChange={()=>toggleMeeting(s.id)}
                    style={{width:14,height:14,accentColor:RED,cursor:"pointer"}}/>
                </td>
                <td style={{padding:"8px 10px",cursor:"pointer"}} onClick={()=>onRow(s)}>
                  <div style={{fontWeight:700,color:"#1e293b",fontSize:12,lineHeight:1.3}}>{s.title}</div>
                  {ov&&<span style={{fontSize:9,color:RED,fontWeight:700}}>⚠ OVERDUE</span>}
                </td>
                <td style={{padding:"8px 10px"}}>
                  {canEdit
                    ?<select value={s.reporter} onChange={e=>onFieldChange(s.id,"reporter",e.target.value)} style={IS}>{REPORTERS.map(o=><option key={o}>{o}</option>)}</select>
                    :<span style={{color:"#64748b"}}>{s.reporter.split(" ")[0]}</span>}
                </td>
                <td style={{padding:"8px 10px"}}><Badge label={s.desk} color="#6366f1" sm/></td>
                <td style={{padding:"8px 10px"}}>
                  {canEdit
                    ?<select value={s.status} onChange={e=>onFieldChange(s.id,"status",e.target.value)} style={{...IS,color:SC[s.status]}}>{STATUSES.map(o=><option key={o}>{o}</option>)}</select>
                    :<SBadge s={s.status} sm/>}
                </td>
                <td style={{padding:"8px 10px"}}>
                  {canEdit

function CalendarView({stories,onStory}){
  const t=new Date();
  const [mo,setMo]=useState(t.getMonth());
  const [yr,setYr]=useState(t.getFullYear());
  const MN=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const fd=new Date(yr,mo,1).getDay(),dm=new Date(yr,mo+1,0).getDate();
  const byDay={};
  stories.forEach(s=>{
    const d=s.pubDate||s.eta;if(!d)return;
    const dt=new Date(d);
    if(dt.getMonth()===mo&&dt.getFullYear()===yr){const k=dt.getDate();byDay[k]=byDay[k]||[];byDay[k].push(s);}
  });
  const cells=[];
  for(let i=0;i<fd;i++)cells.push(null);
  for(let d=1;d<=dm;d++)cells.push(d);
  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <button onClick={()=>{if(mo===0){setMo(11);setYr(y=>y-1);}else setMo(m=>m-1);}} style={{padding:"4px 14px",background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:7,fontSize:16,fontWeight:600}}>‹</button>
        <h3 style={{fontSize:16,fontWeight:700,color:"#1e293b"}}>{MN[mo]} {yr}</h3>
        <button onClick={()=>{if(mo===11){setMo(0);setYr(y=>y+1);}else setMo(m=>m+1);}} style={{padding:"4px 14px",background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:7,fontSize:16,fontWeight:600}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:2}}>
        {["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=><div key={d} style={{textAlign:"center",fontSize:9,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",padding:"4px 0"}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
        {cells.map((day,i)=>{
          const isTd=day===t.getDate()&&mo===t.getMonth()&&yr===t.getFullYear();
          const ds=day?(byDay[day]||[]):[];
          return(
            <div key={i} style={{minHeight:70,background:day?"#fff":"transparent",borderRadius:6,border:day?`1px solid ${isTd?RED:"#e8edf3"}`:"none",padding:day?"5px 4px":0}}>
              {day&&<>
                <div style={{width:20,height:20,borderRadius:"50%",background:isTd?RED:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:isTd?800:500,color:isTd?"#fff":"#1e293b",marginBottom:2}}>{day}</div>
                {ds.slice(0,2).map(s=>(
                  <div key={s.id} onClick={()=>onStory(s)} style={{background:SC[s.status]+"20",color:SC[s.status],fontSize:8,padding:"1px 3px",borderRadius:3,marginBottom:1,cursor:"pointer",fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.title}</div>
                ))}
                {ds.length>2&&<div style={{fontSize:8,color:"#94a3b8"}}>+{ds.length-2}</div>}
              </>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Analytics({stories}){

  const deskData={labels:DESKS.filter(d=>stories.some(x=>x.desk===d)),datasets:[{data:DESKS.filter(d=>stories.some(x=>x.desk===d)).map(d=>stories.filter(x=>x.desk===d).length),backgroundColor:"#6366f1",borderRadius:4}]};
  const repData={labels:REPORTERS.map(r=>r.split(" ")[0]),datasets:[{data:REPORTERS.map(r=>stories.filter(x=>x.reporter===r).length),backgroundColor:RED,borderRadius:4}]};
  const trendData={labels:["Apr W3","Apr W4","May W1","May W2","May W3","May W4"],datasets:[{label:"Web",data:[3,4,3,6,5,2],borderColor:"#0ea5e9",backgroundColor:"#0ea5e920",fill:true,tension:0.4,pointRadius:3},{label:"Magazine",data:[1,2,2,2,2,1],borderColor:RED,backgroundColor:RED+"20",fill:true,tension:0.4,pointRadius:3}]};
  const priData={labels:PRIS,datasets:[{data:PRIS.map(p=>stories.filter(x=>x.pri===p).length),backgroundColor:PRIS.map(p=>PC[p]),borderWidth:0}]};

          </div>
        ))}
      </div>
      <div className="chart-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
        <div style={card}><div style={{fontSize:12,fontWeight:700,color:"#1e293b",marginBottom:10}}>Stories by Status</div><ChartBox type="bar" data={statData} height={200} options={{scales:{x:{ticks:{font:{size:8},maxRotation:35}},y:{ticks:{font:{size:9}}}},plugins:{legend:{display:false}}}}/></div>
        <div style={card}><div style={{fontSize:12,fontWeight:700,color:"#1e293b",marginBottom:10}}>Weekly Trend</div><ChartBox type="line" data={trendData} height={200} options={{scales:{x:{ticks:{font:{size:9}}},y:{ticks:{font:{size:9}},beginAtZero:true}},plugins:{legend:{display:true,position:"bottom",labels:{boxWidth:8,font:{size:9}}}}}}/></div>

        <div style={card}>
          <div style={{fontSize:12,fontWeight:700,color:"#1e293b",marginBottom:10}}>Mix & Priority</div>

          <div key={s.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",background:d<=0?"#fef2f2":d<=2?"#fff7ed":"#f8fafc",borderRadius:7,border:`1px solid ${d<=0?"#fecaca":d<=2?"#fed7aa":"#e2e8f0"}`,marginBottom:5}}>
            <div style={{width:34,height:34,borderRadius:6,background:d<=0?"#ef4444":d<=2?"#f97316":"#6366f1",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,flexShrink:0}}>{d<=0?"!":d}d</div>
            <div style={{flex:1,minWidth:0}}><div style={{fontWeight:700,fontSize:12,color:"#1e293b",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.title}</div><div style={{fontSize:10,color:"#94a3b8"}}>{s.reporter} · {s.desk}</div></div>
            <SBadge s={s.status} sm/><PBadge p={s.pri} sm/>

      </div>
    </div>
  );
}

/* ── MEETING MODE with full editing ── */
function MeetingMode({stories,onClose,onStatus,onFieldChange,onSaveComment}){
  const [idx,setIdx]=useState(0);
  const [c,setC]=useState("");
  const Q=stories;
  const s=Q[idx];
  const IS={padding:"5px 8px",borderRadius:7,border:"1px solid #e2e8f0",background:"#f8fafc",fontSize:12,color:"#475569",fontFamily:"inherit",width:"100%"};

  const addC=()=>{
    if(!c.trim()||!s)return;
    const updated=[...(s.comments||[]),{id:Date.now(),text:c,author:"You",ts:new Date().toISOString()}];
    onSaveComment(s.id,updated);
    setC("");
  };

  if(!s)return(
    <div style={{textAlign:"center",padding:"40px 0"}}>
      <div style={{fontSize:44,marginBottom:12}}>✅</div>
      <h3 style={{color:"#1e293b",marginBottom:14}}>All stories reviewed!</h3>
      <button onClick={onClose} style={{padding:"9px 24px",background:RED,color:"#fff",border:"none",borderRadius:8,fontWeight:700,fontSize:13}}>Exit Meeting Mode</button>
    </div>
  );
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <span style={{fontSize:11,color:"#94a3b8"}}>Story {idx+1} of {Q.length}</span>
        <div style={{flex:1,height:4,background:"#f1f5f9",borderRadius:4,margin:"0 12px"}}><div style={{height:"100%",background:RED,borderRadius:4,width:`${((idx+1)/Q.length)*100}%`,transition:"width 0.3s"}}></div></div>
        <button onClick={onClose} style={{padding:"4px 12px",background:"#f1f5f9",border:"none",borderRadius:7,fontSize:11,color:"#64748b"}}>Exit</button>
      </div>

      <div style={{background:"#f8fafc",borderRadius:10,border:"1px solid #e2e8f0",padding:"16px",marginBottom:12}}>
        <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}><Badge label={s.desk} color="#6366f1"/><Badge label={s.pub} color="#0ea5e9"/><PBadge p={s.pri}/><SBadge s={s.status}/></div>
        <h2 style={{fontSize:17,fontWeight:800,color:"#1e293b",marginBottom:6,lineHeight:1.3}}>{s.title}</h2>
        <p style={{color:"#475569",fontSize:13,lineHeight:1.6,marginBottom:12}}>{s.desc}</p>

        {/* Editable fields in meeting mode */}
        <div className="meeting-meta" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"8px 10px",marginBottom:12}}>
          {[["Status","status",STATUSES],["Reporter","reporter",REPORTERS],["Priority","pri",PRIS],["Type","pub",["Web","Magazine","Both"]]].map(([lbl,key,opts])=>(
            <div key={key}>
              <div style={{fontSize:9,color:"#94a3b8",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:3}}>{lbl}</div>
              <select value={s[key]||""} onChange={e=>onFieldChange(s.id,key,e.target.value)} style={IS}>
                {opts.map(o=><option key={o}>{o}</option>)}
              </select>
            </div>
          ))}
          <div>
            <div style={{fontSize:9,color:"#94a3b8",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:3}}>ETA</div>
            <input type="date" value={s.eta||""} onChange={e=>onFieldChange(s.id,"eta",e.target.value)} style={IS}/>
          </div>
        </div>

        {s.notes&&<div style={{background:"#fffbeb",borderRadius:7,padding:"7px 10px",fontSize:12,color:"#92400e",marginBottom:10}}>📝 {s.notes}</div>}

        {/* Comments in meeting mode */}
        <div style={{borderTop:"1px solid #e2e8f0",paddingTop:10}}>
          <div style={{fontSize:9,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6}}>Comments ({(s.comments||[]).length})</div>
          {(s.comments||[]).slice(-2).map(x=>(
            <div key={x.id} style={{background:"#fff",borderRadius:6,padding:"6px 9px",marginBottom:4,fontSize:11}}>
              <span style={{fontWeight:700,color:"#1e293b"}}>{x.author}</span>
              <span style={{color:"#94a3b8",marginLeft:6,fontSize:10}}>{new Date(x.ts).toLocaleString("en-IN")}</span>
              <p style={{margin:"2px 0 0",color:"#475569"}}>{x.text}</p>
            </div>
          ))}
          <div style={{display:"flex",gap:6,marginTop:6}}>
            <input value={c} onChange={e=>setC(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addC()} placeholder="Add comment…" style={{flex:1,padding:"6px 9px",borderRadius:6,border:"1px solid #e2e8f0",fontSize:12,outline:"none",fontFamily:"inherit"}}/>
            <button onClick={addC} style={{padding:"6px 12px",background:RED,color:"#fff",border:"none",borderRadius:6,fontWeight:600,fontSize:11}}>Post</button>
          </div>
        </div>
      </div>

      <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:8}}>
        {["Approved","Assigned","Hold/Dropped"].map(a=>(
          <button key={a} onClick={()=>{onStatus(s.id,a);}} style={{flex:1,minWidth:90,padding:"10px 0",border:"none",borderRadius:8,fontWeight:700,fontSize:12,background:a==="Approved"?"#22c55e":a==="Assigned"?"#0ea5e9":"#f1f5f9",color:a==="Hold/Dropped"?"#94a3b8":"#fff"}}>
            {a==="Approved"?"✓ Approve":a==="Assigned"?"→ Assign":"✕ Hold"}
          </button>
        ))}
      </div>
      <div style={{display:"flex",gap:7}}>
        <button onClick={()=>setIdx(i=>Math.max(i-1,0))} disabled={idx===0} style={{flex:1,padding:"8px",background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:7,fontWeight:600,fontSize:12,color:idx===0?"#cbd5e1":"#475569",cursor:idx===0?"default":"pointer"}}>← Prev</button>
        <button onClick={()=>setIdx(i=>Math.min(i+1,Q.length-1))} disabled={idx===Q.length-1} style={{flex:1,padding:"8px",background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:7,fontWeight:600,fontSize:12,color:idx===Q.length-1?"#cbd5e1":"#475569",cursor:idx===Q.length-1?"default":"pointer"}}>Next →</button>
      </div>
    </div>
  );
}

  const [fReporter,setFReporter]=useState("All");
  const [sk,setSk]=useState("eta");
  const [sd,setSd]=useState("asc");
  const [role,setRole]=useState("admin");
  const [dark,setDark]=useState(false);
  const [meeting,setMeeting]=useState(false);
  const [sync,setSync]=useState("synced");
  const [sideOpen,setSideOpen]=useState(false);
  const [meetingIds,setMeetingIds]=useState(new Set());
  const [showRoleInfo,setShowRoleInfo]=useState(false);
  const [isMobile,setIsMobile]=useState(window.innerWidth<=768);

  useEffect(()=>{
    const h=()=>setIsMobile(window.innerWidth<=768);
    window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);
  },[]);

  useEffect(()=>{
    if(isMobile)setSideOpen(false);else setSideOpen(true);
  },[isMobile]);

  useEffect(()=>{
    sheetsApi("getAll")
      .then(res=>{
        if(res.error)setError(res.error);
        else if(res.stories)setStories(res.stories);
        else setError("Unexpected: "+JSON.stringify(res));
        setLoading(false);
      })
      .catch(err=>{setError(err.message);setLoading(false);});
  },[]);

  const handleSubmit=useCallback(async form=>{
    setSync("saving");
    if(editing){
      const res=await sheetsApi("update",{id:editing.id,story:form});
      if(res.success)setStories(s=>s.map(x=>x.id===editing.id?res.story:x));
    }else{
      const res=await sheetsApi("create",{story:form});
      if(res.story)setStories(s=>[...s,res.story]);
    }
    setShowForm(false);setEditing(null);setSync("synced");
  },[editing]);

  const handleDel=useCallback(async id=>{
    if(!window.confirm("Delete this story?"))return;
    setSync("saving");
    await sheetsApi("delete",{id});
    setStories(s=>s.filter(x=>x.id!==id));
    setSelectedIdx(null);setSync("synced");
  },[]);

  // Unified field change — saves to Sheets immediately
  const handleFieldChange=useCallback(async(id,key,val)=>{
    setStories(s=>s.map(x=>x.id===id?{...x,[key]:val}:x));
    setSync("saving");
    await sheetsApi("update",{id,story:{[key]:val}});
    setSync("synced");
  },[]);

  // Save comments to Sheets
  const handleSaveComment=useCallback(async(id,comments)=>{
    setStories(s=>s.map(x=>x.id===id?{...x,comments}:x));
    setSync("saving");
    await sheetsApi("update",{id,story:{comments}});
    setSync("synced");
  },[]);

  const toggleMeeting=useCallback(id=>{
    setMeetingIds(prev=>{
      const n=new Set(prev);
      if(n.has(id))n.delete(id);else n.add(id);
      return n;
    });
  },[]);

  const filtered=useMemo(()=>{
    let s=[...stories];
    if(search)s=s.filter(x=>x.title.toLowerCase().includes(search.toLowerCase())||x.reporter.toLowerCase().includes(search.toLowerCase())||x.desk.toLowerCase().includes(search.toLowerCase()));
    if(fDesk!=="All")s=s.filter(x=>x.desk===fDesk);
    if(fStatus!=="All")s=s.filter(x=>x.status===fStatus);
    if(fPri!=="All")s=s.filter(x=>x.pri===fPri);
    if(fReporter!=="All")s=s.filter(x=>x.reporter===fReporter);
    s.sort((a,b)=>{
      let va=a[sk]||"",vb=b[sk]||"";
      if(sk==="pri"){const o={Critical:0,High:1,Medium:2,Low:3};va=o[va];vb=o[vb];}
      return sd==="asc"?(va<vb?-1:1):(va>vb?-1:1);
    });
    return s;
  },[stories,search,fDesk,fStatus,fPri,fReporter,sk,sd]);

  const meetingStories=useMemo(()=>
    meetingIds.size>0
      ? stories.filter(s=>meetingIds.has(s.id))
      : stories.filter(s=>["Idea Proposed","Approved","Assigned"].includes(s.status))
  ,[stories,meetingIds]);

  const selectedStory=selectedIdx!==null?filtered[selectedIdx]:null;
  const ovCount=stories.filter(isOverdue).length;
  const BG=dark?"#0f172a":"#f1f5f9";
  const CARD=dark?"#1e293b":"#fff";
  const TP=dark?"#f1f5f9":"#1e293b";
  const TS=dark?"#94a3b8":"#64748b";
  const BC=dark?"#334155":"#e2e8f0";
  const VIEWS=[{id:"analytics",l:"Dashboard",i:"📊"},{id:"table",l:"Table",i:"📋"},{id:"kanban",l:"Kanban",i:"🗂"},{id:"calendar",l:"Calendar",i:"📅"}];
  const selStyle={padding:"5px 7px",borderRadius:7,border:`1px solid ${BC}`,background:dark?"#1e293b":"#f8fafc",color:TS,fontSize:11,fontFamily:"inherit"};

  const LOADING_SCREEN=(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:14,background:"#111827"}}>
      <div style={{width:44,height:44,background:RED,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <span style={{color:"#fff",fontWeight:900,fontSize:20}}>F</span>
      </div>
      <div style={{color:"#94a3b8",fontSize:13}}>Loading from Google Sheets…</div>
    </div>
  );

  const ERROR_SCREEN=(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:14,background:"#111827",padding:24}}>
      <div style={{fontSize:36}}>⚠️</div>
      <div style={{color:"#f87171",fontSize:15,fontWeight:700}}>Could not connect to Google Sheets</div>
      <div style={{color:"#64748b",fontSize:12,maxWidth:440,textAlign:"center",lineHeight:1.6}}>Error: {error}</div>
      <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:10,padding:"14px 18px",maxWidth:440,width:"100%"}}>
        {["URL must NOT have /u/1/ in it","Deploy → Who has access → set to Anyone","Re-deploy after every script change","Open /exec URL in browser — should show JSON","Run getAllStories() in Apps Script to authorize"].map((t,i)=>(
          <div key={i} style={{display:"flex",gap:7,marginBottom:5,fontSize:11,color:"#94a3b8"}}>
            <span style={{color:"#f97316",fontWeight:700,flexShrink:0}}>{i+1}.</span><span>{t}</span>
          </div>
        ))}
      </div>
      <button onClick={()=>{setError(null);setLoading(true);sheetsApi("getAll").then(res=>{if(res.stories)setStories(res.stories);else setError(res.error||"Failed");setLoading(false);}).catch(e=>{setError(e.message);setLoading(false);});}} style={{padding:"9px 22px",background:RED,color:"#fff",border:"none",borderRadius:8,fontWeight:700,fontSize:13,cursor:"pointer"}}>↺ Retry</button>
    </div>
  );

  if(loading)return LOADING_SCREEN;
  if(error)return ERROR_SCREEN;

  const canEdit=role==="editor"||role==="admin";

  return(
    <div style={{display:"flex",minHeight:"100vh",background:BG,color:TP}}>

      {/* Mobile overlay */}
      {isMobile&&sideOpen&&<div className="sidebar-overlay" onClick={()=>setSideOpen(false)}/>}

      {/* ── SIDEBAR ── */}
      <div style={{width:sideOpen?220:0,minWidth:sideOpen?220:0,background:dark?"#060d1f":"#111827",transition:"width 0.22s ease,min-width 0.22s ease",flexShrink:0,display:"flex",flexDirection:"column",position:isMobile?"fixed":"sticky",top:0,left:0,height:"100vh",overflowY:"auto",overflowX:"hidden",zIndex:50}}>
        <div style={{padding:"14px 12px",borderBottom:"1px solid rgba(255,255,255,0.07)",display:"flex",alignItems:"center",minHeight:56}}>
          <div style={{width:30,height:30,background:RED,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <span style={{color:"#fff",fontWeight:900,fontSize:13}}>F</span>
          </div>
          <div style={{marginLeft:9,opacity:sideOpen?1:0,transition:"opacity 0.15s"}}>
            <div style={{color:"#fff",fontWeight:800,fontSize:12,lineHeight:1.2}}>Forbes India</div>
            <div style={{color:"#4b5563",fontSize:9,marginTop:1}}>Editorial Workflow</div>
          </div>
        </div>

        <nav style={{padding:"10px 6px",flex:1}}>
          {VIEWS.map(v=>(
            <button key={v.id} className="nav-btn" onClick={()=>{setView(v.id);if(isMobile)setSideOpen(false);}} style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"8px 9px",borderRadius:7,border:"none",cursor:"pointer",marginBottom:1,background:view===v.id?"rgba(200,16,46,0.18)":"transparent",color:view===v.id?"#f87171":"#6b7280",textAlign:"left",fontSize:12,fontWeight:view===v.id?700:400}}>
              <span style={{fontSize:14,flexShrink:0}}>{v.i}</span>
              <span>{v.l}</span>
            </button>
          ))}

          {/* Reporter quick filters */}
          <div style={{marginTop:16,paddingLeft:2}}>
            <div style={{fontSize:9,color:"#374151",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:5}}>Reporters</div>
            <button onClick={()=>setFReporter("All")} style={{width:"100%",textAlign:"left",padding:"4px 8px",borderRadius:5,border:"none",cursor:"pointer",background:fReporter==="All"?"rgba(99,102,241,0.15)":"transparent",color:fReporter==="All"?"#818cf8":"#6b7280",fontSize:11,marginBottom:1,fontFamily:"inherit"}}>All Reporters</button>
            {REPORTERS.map(r=>(
              <button key={r} onClick={()=>{setFReporter(fReporter===r?"All":r);if(isMobile)setSideOpen(false);}} style={{width:"100%",textAlign:"left",padding:"4px 8px",borderRadius:5,border:"none",cursor:"pointer",background:fReporter===r?"rgba(99,102,241,0.15)":"transparent",color:fReporter===r?"#818cf8":"#6b7280",fontSize:11,marginBottom:1,fontFamily:"inherit"}}>
                {r}
              </button>
            ))}
          </div>
        </nav>

        <div style={{padding:"8px 6px",borderTop:"1px solid rgba(255,255,255,0.05)"}}>
          <div style={{padding:"7px 9px",background:"rgba(255,255,255,0.04)",borderRadius:7,marginBottom:6}}>
            <div style={{fontSize:9,color:"#4b5563",fontWeight:700,textTransform:"uppercase",marginBottom:4,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              Role
              <button onClick={()=>setShowRoleInfo(true)} style={{background:"none",border:"none",color:"#4b5563",fontSize:10,cursor:"pointer",padding:0}}>?</button>
            </div>
            <select value={role} onChange={e=>setRole(e.target.value)} style={{width:"100%",background:"transparent",border:"1px solid rgba(255,255,255,0.08)",borderRadius:5,color:"#9ca3af",padding:"3px 6px",fontSize:11,fontFamily:"inherit"}}>
              {ROLES.map(r=><option key={r} value={r} style={{background:"#111827"}}>{r.charAt(0).toUpperCase()+r.slice(1)}</option>)}
            </select>
          </div>
        </div>
      </div>

      {/* ── MAIN ── */}
      <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>

        {/* Top bar */}
        <div style={{background:CARD,borderBottom:`1px solid ${BC}`,padding:"10px 14px",display:"flex",alignItems:"center",gap:8,position:"sticky",top:0,zIndex:40,flexWrap:"wrap",rowGap:6}}>
          <button onClick={()=>setSideOpen(o=>!o)} style={{padding:"6px 8px",background:"transparent",border:"none",borderRadius:7,fontSize:18,color:TS,cursor:"pointer",flexShrink:0}}>☰</button>
          <div style={{flex:"1 1 120px"}}>
            <h1 className="mobile-topbar-title" style={{fontSize:16,fontWeight:800,color:TP,lineHeight:1}}>{VIEWS.find(v=>v.id===view)?.l}</h1>
            <div style={{fontSize:10,color:TS,marginTop:1}}>{filtered.length} stories{ovCount>0&&<span style={{color:"#ef4444",fontWeight:700}}> · ⚠ {ovCount} overdue</span>}{fReporter!=="All"&&<span style={{color:"#818cf8"}}> · {fReporter.split(" ")[0]}</span>}</div>
          </div>

          <div className="desktop-only" style={{display:"flex",alignItems:"center",gap:5,background:dark?"#0f172a":"#f1f5f9",borderRadius:7,padding:"5px 9px"}}>
            <span style={{color:TS,fontSize:12}}>🔍</span>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search…" style={{border:"none",background:"transparent",outline:"none",fontSize:11,color:TP,width:140,fontFamily:"inherit"}}/>
          </div>

          <div className="topbar-filters desktop-only" style={{display:"flex",gap:5}}>
            <select value={fDesk} onChange={e=>setFDesk(e.target.value)} style={selStyle}><option value="All">All Desks</option>{DESKS.map(o=><option key={o}>{o}</option>)}</select>
            <select value={fStatus} onChange={e=>setFStatus(e.target.value)} style={selStyle}><option value="All">All Statuses</option>{STATUSES.map(o=><option key={o}>{o}</option>)}</select>
            <select value={fPri} onChange={e=>setFPri(e.target.value)} style={selStyle}><option value="All">All Priorities</option>{PRIS.map(o=><option key={o}>{o}</option>)}</select>
            <select value={fReporter} onChange={e=>setFReporter(e.target.value)} style={selStyle}><option value="All">All Reporters</option>{REPORTERS.map(o=><option key={o}>{o}</option>)}</select>
          </div>

          <button onClick={()=>setDark(d=>!d)} style={{padding:"5px 8px",background:dark?"#334155":"#f1f5f9",border:"none",borderRadius:7,fontSize:12,cursor:"pointer",flexShrink:0}}>{dark?"☀️":"🌙"}</button>
          <div style={{padding:"4px 9px",background:sync==="saving"?"#fffbeb":"#f0fdf4",borderRadius:7,fontSize:10,color:sync==="saving"?"#92400e":"#166534",whiteSpace:"nowrap",fontWeight:600,flexShrink:0}}>{sync==="saving"?"⏳":"✓"}</div>

          {canEdit&&<>
            <button onClick={()=>{if(meetingIds.size===0&&meetingStories.length===0){alert("No stories with Idea Proposed/Approved/Assigned status.");return;}setMeeting(true);}} style={{padding:"6px 10px",background:"#1e293b",color:"#fff",border:"none",borderRadius:7,fontSize:11,fontWeight:700,whiteSpace:"nowrap",flexShrink:0}}>
              🎙 {meetingIds.size>0?`Meeting (${meetingIds.size})`:"Meeting"}
            </button>
            <button onClick={()=>{setEditing(null);setShowForm(true);}} style={{padding:"6px 12px",background:RED,color:"#fff",border:"none",borderRadius:7,fontSize:11,fontWeight:700,whiteSpace:"nowrap",flexShrink:0}}>+ Add</button>
          </>}
        </div>

        {/* Mobile filter row */}
        <div className="mobile-filter-row">
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search…" style={{padding:"5px 9px",borderRadius:7,border:"1px solid #e2e8f0",fontSize:11,outline:"none",fontFamily:"inherit",minWidth:100}}/>
          <select value={fDesk} onChange={e=>setFDesk(e.target.value)}><option value="All">All Desks</option>{DESKS.map(o=><option key={o}>{o}</option>)}</select>
          <select value={fStatus} onChange={e=>setFStatus(e.target.value)}><option value="All">All Statuses</option>{STATUSES.map(o=><option key={o}>{o}</option>)}</select>
          <select value={fPri} onChange={e=>setFPri(e.target.value)}><option value="All">All Priorities</option>{PRIS.map(o=><option key={o}>{o}</option>)}</select>
        </div>

        {/* Content */}
        <div style={{flex:1,padding:"14px 16px",overflowY:"auto"}}>
          {view==="analytics"&&<Analytics stories={stories}/>}
          {view==="table"&&(
            <div style={{background:CARD,borderRadius:10,border:`1px solid ${BC}`,overflow:"hidden"}}>
              {meetingIds.size>0&&<div style={{padding:"7px 14px",background:"#fff7ed",borderBottom:"1px solid #fed7aa",fontSize:11,color:"#92400e",fontWeight:600}}>
                📌 {meetingIds.size} {meetingIds.size===1?"story":"stories"} selected for Meeting Mode
              </div>}
              <TableView stories={filtered} onRow={s=>{const i=filtered.findIndex(x=>x.id===s.id);setSelectedIdx(i);}} sk={sk} setSk={setSk} sd={sd} setSd={setSd} role={role} onFieldChange={handleFieldChange} onDelete={handleDel} meetingIds={meetingIds} toggleMeeting={toggleMeeting}/>
            </div>
          )}
          {view==="kanban"&&<KanbanView stories={filtered} onCard={s=>{const i=filtered.findIndex(x=>x.id===s.id);setSelectedIdx(i);}}/>}
          {view==="calendar"&&<div style={{background:CARD,borderRadius:10,border:`1px solid ${BC}`,padding:16}}><CalendarView stories={stories} onStory={s=>{const i=filtered.findIndex(x=>x.id===s.id);setSelectedIdx(i>=0?i:null);}}/></div>}
        </div>
      </div>

      {/* ── MODALS ── */}
      {(showForm||editing)&&(
        <Modal title={editing?"Edit Story":"Submit New Story"} onClose={()=>{setShowForm(false);setEditing(null);}} wide>
          <StoryForm onSubmit={handleSubmit} init={editing} onCancel={()=>{setShowForm(false);setEditing(null);}}/>
        </Modal>
      )}

      {selectedStory&&!editing&&(
        <Modal title={selectedStory.title} onClose={()=>setSelectedIdx(null)} wide>
          <StoryDetail
            story={selectedStory}
            role={role}
            onEdit={s=>{setEditing(s);setSelectedIdx(null);}}
            onDelete={id=>{handleDel(id);setSelectedIdx(null);}}
            onStatus={(id,status)=>handleFieldChange(id,"status",status)}
            onFieldChange={handleFieldChange}
            onSaveComment={handleSaveComment}
            onPrev={()=>setSelectedIdx(i=>Math.max(i-1,0))}
            onNext={()=>setSelectedIdx(i=>Math.min(i+1,filtered.length-1))}
            hasPrev={selectedIdx>0}
            hasNext={selectedIdx<filtered.length-1}
          />
        </Modal>
      )}

      {meeting&&(
        <Modal title={`🎙 Meeting Mode${meetingIds.size>0?" ("+meetingIds.size+" selected)":""}`} onClose={()=>setMeeting(false)} wide>
          <MeetingMode
            stories={meetingStories}
            onClose={()=>setMeeting(false)}
            onStatus={(id,status)=>handleFieldChange(id,"status",status)}
            onFieldChange={handleFieldChange}
            onSaveComment={handleSaveComment}
          />
        </Modal>
      )}

      {showRoleInfo&&<RoleInfoModal onClose={()=>setShowRoleInfo(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
