<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Forbes India — Editorial Workflow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.3/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;font-family:'DM Sans',system-ui,sans-serif;font-size:15.4px}
body{background:#f1f5f9;color:#1e293b}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:10px}
::-webkit-scrollbar-track{background:transparent}
/* Sticky thead for table */
.story-table thead{position:sticky;top:0;z-index:10}
.story-table thead tr th{background:#f8fafc}
.hover-row:hover td{background:#f0f9ff}
.kanban-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.10)!important}
.nav-btn:hover{background:rgba(255,255,255,0.07)!important}
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,0.65);z-index:999;display:flex;align-items:flex-start;justify-content:center;padding:20px 12px;overflow-y:auto}
.modal-box{background:#fff;border-radius:14px;width:100%;max-width:880px;box-shadow:0 32px 80px rgba(0,0,0,0.22);animation:slideUp 0.18s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes popIn{0%{transform:scale(0.7);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
input,select,textarea{font-family:inherit}
button{font-family:inherit;cursor:pointer}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:49}
/* Status filter dropdown */
.status-filter-dropdown{position:absolute;top:100%;left:0;background:#fff;border:1px solid #e2e8f0;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,0.12);z-index:100;min-width:260px;padding:10px;margin-top:4px;animation:slideUp 0.14s ease}
.status-filter-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:12.5px;font-weight:500;color:#334155;transition:background 0.1s}
.status-filter-item:hover{background:#f1f5f9}
.status-filter-item.active{background:#f8fafc}
.status-filter-item input[type=checkbox]{width:14px;height:14px;accent-color:#c8102e;cursor:pointer;flex-shrink:0}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
@media(max-width:768px){
  .sidebar-overlay{display:block}
  .desktop-only{display:none!important}
  .topbar-filters{display:none!important}
  .mobile-filter-row{display:flex!important}
  .story-table-wrap{overflow-x:auto}
  .story-table td,.story-table th{padding:8px 10px!important;font-size:12px!important}
  .kpi-grid{grid-template-columns:repeat(2,1fr)!important}
  .chart-grid{grid-template-columns:1fr!important}
  .modal-overlay{padding:8px 4px!important;align-items:flex-end}
  .modal-box{border-radius:14px 14px 0 0!important;max-height:92vh;overflow-y:auto}
  .form-grid{grid-template-columns:1fr!important}
  .detail-grid{grid-template-columns:1fr 1fr!important}
}
.mobile-filter-row{display:none;gap:6px;overflow-x:auto;padding:8px 14px;background:#fff;border-bottom:1px solid #e2e8f0}
.mobile-filter-row select,.mobile-filter-row input{flex-shrink:0;padding:5px 8px;border-radius:7px;border:1px solid #e2e8f0;background:#f8fafc;font-size:12px;color:#475569;font-family:inherit}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;font-size:15px;color:#94a3b8">Loading Forbes India Dashboard...</div></div>

<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useMemo,useCallback} = React;

const RED="#c8102e";
// UPDATED: added 4 new statuses
const STATUSES=["Idea Proposed","Approved","Researching","Interview Scheduled","Writing","Editing","Video sent for editing","Sent for content cut","Sent for subs","Fact Check","Ready to Publish","Scheduled","Published","Hold/Dropped"];
const SC={
  "Idea Proposed":"#6366f1","Approved":"#0ea5e9","Researching":"#f59e0b",
  "Interview Scheduled":"#10b981","Writing":"#3b82f6","Editing":"#f97316",
  "Video sent for editing":"#e879f9","Sent for content cut":"#fb7185",
  "Sent for subs":"#34d399","Fact Check":"#ec4899",
  "Ready to Publish":"#06b6d4","Scheduled":"#a855f7",
  "Published":"#22c55e","Hold/Dropped":"#94a3b8"
};
const CATS=["News","Deep Dive","Explainer","AI Tracker""Take One","Leadership","Innovation","Startups","Billionaires","30 Under 30","W-Power","Rich List","Ai List","Magazine","Life","Slideshow","Graphic of the day","Others"];
const FORMATS=["Long-form Feature","News Report","Interview","Opinion/Column","Listicle","Profile","Data Story","Photo Essay","Video","Podcast"];
const PRIS=["Critical","High","Medium","Low"];
const PC={"Critical":"#ef4444","High":"#f97316","Medium":"#f59e0b","Low":"#6366f1"};
const REPORTERS=["Samreen Wani","Naini Thaker","Suveen Sinha","Payal Ganguly","Himani Kothari","Samidha Jain","Kathakali Chanda","Vasudha Mukherjee","Samar Srivastava","Benu Joshi Routh","Kunal Purandare","Nasrin Sultana","Jasodhara Banerjee","Neha Bothra","Monica Bathija","Siddhant Konduskar","Pankti Mehta Kadakia","Sarthak Choudhury","Other"];

const MEDIA_TYPES=["Text","Multimedia"];

const SHEETS_API="https://script.google.com/macros/s/AKfycbyY55bnq6mXy94HfEUQQofUsnIdF2rfCMotMDOVYdcLHjweQBC9NcdLEqvJWMNT8xSV/exec";

async function sheetsApi(action,payload={}){
  try{
    const res=await fetch(SHEETS_API,{method:"POST",body:JSON.stringify({action,...payload})});
    const text=await res.text();
    try{return JSON.parse(text);}catch(e){console.error("Non-JSON:",text);return{error:"Bad response"};}
  }catch(err){console.error("API error:",err);return{error:err.message};}
}

const isOverdue=s=>{
  if(!s.eta||["Published","Hold/Dropped"].includes(s.status))return false;
  const eta=new Date(s.eta);eta.setHours(23,59,59,999);
  return eta<new Date();
};

// FIX: Format date without timezone shifting — parse yyyy-mm-dd as LOCAL date
const fmt=d=>{
  if(!d)return"—";
  // Parse yyyy-mm-dd as local time (not UTC) to avoid day-shift
  const m=/^(\d{4})-(\d{2})-(\d{2})$/.exec(d.trim());
  if(m){
    const dt=new Date(+m[1],+m[2]-1,+m[3]);
    return dt.toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"});
  }
  return new Date(d).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"});
};

function normaliseDate(val){
  if(!val||typeof val!=="string")return val||"";
  if(/^\d{4}-\d{2}-\d{2}$/.test(val.trim()))return val.trim();
  const dmy=/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/.exec(val.trim());
  if(dmy)return `${dmy[3]}-${dmy[2].padStart(2,"0")}-${dmy[1].padStart(2,"0")}`;
  // FIX: avoid using toISOString() (UTC) — use local date parts instead
  const d=new Date(val);
  if(!isNaN(d)){
    const yr=d.getFullYear();
    const mo=String(d.getMonth()+1).padStart(2,"0");
    const dy=String(d.getDate()).padStart(2,"0");
    return `${yr}-${mo}-${dy}`;
  }
  return val;
}

function normaliseStory(s){
  return{...s,eta:normaliseDate(s.eta),pubDate:normaliseDate(s.pubDate)};
}

const Badge=({label,color,sm})=>(
  <span style={{display:"inline-flex",alignItems:"center",padding:sm?"2px 8px":"3px 11px",borderRadius:20,fontSize:sm?11:13,fontWeight:600,background:color+"20",color,border:`1px solid ${color}35`,whiteSpace:"nowrap",lineHeight:1.4}}>{label}</span>
);
const SBadge=({s,sm})=><Badge label={s} color={SC[s]||"#888"} sm={sm}/>;
const PBadge=({p,sm})=><Badge label={p} color={PC[p]||"#888"} sm={sm}/>;

function ChartBox({type,data,options,height=220}){
  const ref=useRef(null);const inst=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    if(inst.current)inst.current.destroy();
    inst.current=new Chart(ref.current,{type,data,options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},...options}});
    return()=>{if(inst.current)inst.current.destroy();};
  },[JSON.stringify(data)]);
  return <div style={{position:"relative",height}}><canvas ref={ref}/></div>;
}

function Modal({title,children,onClose,wide}){
  return(
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal-box" style={{maxWidth:wide?880:660}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"17px 22px",borderBottom:"1px solid #f1f5f9",position:"sticky",top:0,background:"#fff",zIndex:2,borderRadius:"14px 14px 0 0"}}>
          <h3 style={{fontSize:17,fontWeight:700,color:"#1e293b",lineHeight:1.3,flex:1,paddingRight:8}}>{title}</h3>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:24,color:"#94a3b8",lineHeight:1,padding:"0 4px",flexShrink:0}}>×</button>
        </div>
        <div style={{padding:"20px 22px"}}>{children}</div>
      </div>
    </div>
  );
}

const EF={title:"",desc:"",reporter:REPORTERS[0],desk:CATS[0],format:FORMATS[0],pub:"Web",pri:"Medium",status:"Idea Proposed",eta:"",pubDate:"",issue:"",notes:"",refs:"",media:"Text"};
function StoryForm({onSubmit,init,onCancel}){
  const [f,setF]=useState(init?normaliseStory(init):EF);
  const [btnState,setBtnState]=useState("idle"); // idle | saving | done
  const set=k=>e=>setF(p=>({...p,[k]:e.target.value}));

  const handleSubmit=async()=>{
    if(!f.title.trim())return;
    setBtnState("saving");
    await onSubmit(f);
    setBtnState("done");
    setTimeout(()=>setBtnState("idle"),1800);
  };
  const I={width:"100%",padding:"9px 12px",borderRadius:7,border:"1px solid #e2e8f0",background:"#f8fafc",fontSize:14,color:"#1e293b",outline:"none",fontFamily:"inherit"};
  const L={fontSize:12,fontWeight:700,color:"#64748b",marginBottom:4,display:"block",textTransform:"uppercase",letterSpacing:"0.06em"};
  const F={marginBottom:14};
  return(
    <div>
      <div className="form-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 18px"}}>
        <div style={{...F,gridColumn:"1/-1"}}><label style={L}>Story Title *</label><input style={{...I,fontSize:15,fontWeight:600}} value={f.title} onChange={set("title")} placeholder="Enter story title..."/></div>
        <div style={{...F,gridColumn:"1/-1"}}><label style={L}>Description / Pitch</label><textarea style={{...I,minHeight:80,resize:"vertical"}} value={f.desc} onChange={set("desc")} placeholder="Story angle, key sources, why it matters now..."/></div>
        <div style={F}><label style={L}>Reporter</label><select style={I} value={f.reporter} onChange={set("reporter")}>{REPORTERS.map(x=><option key={x}>{x}</option>)}</select></div>
        <div style={F}><label style={L}>Category</label><select style={I} value={f.desk} onChange={set("desk")}>{CATS.map(x=><option key={x}>{x}</option>)}</select></div>
        <div style={F}><label style={L}>Format</label><select style={I} value={f.format} onChange={set("format")}>{FORMATS.map(x=><option key={x}>{x}</option>)}</select></div>
        <div style={F}><label style={L}>Publication Type</label><select style={I} value={f.pub} onChange={set("pub")}>{["Web","Magazine","Both"].map(x=><option key={x}>{x}</option>)}</select></div>
        <div style={F}><label style={L}>Media Type</label><select style={I} value={f.media||"Text"} onChange={set("media")}>{MEDIA_TYPES.map(x=><option key={x}>{x}</option>)}</select></div>
        <div style={F}><label style={L}>Priority</label><select style={I} value={f.pri} onChange={set("pri")}>{PRIS.map(x=><option key={x}>{x}</option>)}</select></div>
        <div style={F}><label style={L}>Status</label><select style={I} value={f.status} onChange={set("status")}>{STATUSES.map(x=><option key={x}>{x}</option>)}</select></div>
        <div style={F}><label style={L}>ETA / Deadline</label><input type="date" style={I} value={f.eta} onChange={set("eta")}/></div>
        <div style={F}><label style={L}>Publish Date</label><input type="date" style={I} value={f.pubDate} onChange={set("pubDate")}/></div>
        <div style={{...F,gridColumn:"1/-1"}}><label style={L}>Magazine Issue</label><input style={I} value={f.issue} onChange={set("issue")} placeholder="e.g. June 2026"/></div>
        <div style={{...F,gridColumn:"1/-1"}}><label style={L}>Notes</label><textarea style={{...I,minHeight:60,resize:"vertical"}} value={f.notes} onChange={set("notes")} placeholder="Additional notes..."/></div>
        <div style={{...F,gridColumn:"1/-1"}}><label style={L}>Reference Links</label><input style={I} value={f.refs} onChange={set("refs")} placeholder="https://..."/></div>
      </div>
      <div style={{display:"flex",gap:10,marginTop:8}}>
        <button
          onClick={handleSubmit}
          disabled={btnState!=="idle"}
          style={{
            flex:1,padding:"11px 0",
            background:btnState==="done"?"#16a34a":RED,
            color:"#fff",border:"none",borderRadius:8,fontWeight:700,fontSize:14,
            transition:"background 0.3s",cursor:btnState!=="idle"?"default":"pointer",
            display:"flex",alignItems:"center",justifyContent:"center",gap:8,
            opacity:btnState==="saving"?0.85:1
          }}>
          {btnState==="saving"&&(
            <span style={{width:15,height:15,border:"2px solid rgba(255,255,255,0.35)",borderTopColor:"#fff",borderRadius:"50%",display:"inline-block",animation:"spin 0.7s linear infinite"}}/>
          )}
          {btnState==="done"&&(
            <span style={{animation:"popIn 0.3s ease",display:"inline-block"}}>✓</span>
          )}
          {btnState==="saving"?"Saving…":btnState==="done"?"Saved!":init?"Update Story":"Submit Story"}
        </button>
        <button onClick={onCancel} style={{padding:"11px 22px",background:"#f1f5f9",color:"#64748b",border:"none",borderRadius:8,fontWeight:600,fontSize:14}}>Cancel</button>
      </div>
    </div>
  );
}

function StoryDetail({story,onEdit,onDelete,onFieldChange,onPrev,onNext,hasPrev,hasNext,onSaveComment}){
  const [c,setC]=useState("");
  const [commenter,setCommenter]=useState("");
  const [comments,setComments]=useState(story.comments||[]);
  const ov=isOverdue(story);
  const dl=story.eta?daysLeft(story.eta):null;
  useEffect(()=>setComments(story.comments||[]),[story.id]);

  const addC=()=>{
    if(!c.trim())return;
    if(!commenter.trim()){alert("Please enter your name before posting.");return;}
    const newC={id:Date.now(),text:c,author:commenter,ts:new Date().toISOString()};
    const updated=[...comments,newC];
    setComments(updated);
    onSaveComment(story.id,updated);
    setC("");
  };
  const IS={padding:"4px 7px",borderRadius:6,border:"1px solid #e2e8f0",background:"#f8fafc",fontSize:13,color:"#475569",fontFamily:"inherit",width:"100%"};

  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,gap:8}}>
        <button onClick={onPrev} disabled={!hasPrev} style={{padding:"6px 16px",borderRadius:7,border:"1px solid #e2e8f0",background:hasPrev?"#f8fafc":"#f1f5f9",color:hasPrev?"#475569":"#cbd5e1",fontWeight:700,fontSize:13,cursor:hasPrev?"pointer":"default"}}>← Prev</button>
        <div style={{display:"flex",flexWrap:"wrap",gap:5,justifyContent:"center"}}>
          <SBadge s={story.status}/><PBadge p={story.pri}/>
          <Badge label={story.desk} color="#64748b" sm/>
          <Badge label={(story.media||"Text")==="Multimedia"?"🎬 Multimedia":"📝 Text"} color={(story.media||"Text")==="Multimedia"?"#7c3aed":"#0369a1"} sm/>
          {ov&&<Badge label="⚠ OVERDUE" color="#ef4444" sm/>}
        </div>
        <button onClick={onNext} disabled={!hasNext} style={{padding:"6px 16px",borderRadius:7,border:"1px solid #e2e8f0",background:hasNext?"#f8fafc":"#f1f5f9",color:hasNext?"#475569":"#cbd5e1",fontWeight:700,fontSize:13,cursor:hasNext?"pointer":"default"}}>Next →</button>
      </div>

      <p style={{color:"#475569",fontSize:14,lineHeight:1.75,marginBottom:14}}>{story.desc}</p>

      <div style={{background:"#f8fafc",borderRadius:10,border:"1px solid #e2e8f0",padding:"13px 15px",marginBottom:14}}>
        <div style={{fontSize:11,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>Quick Edit</div>
        <div className="detail-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"9px 13px"}}>
          {[["Status","status",STATUSES],["Reporter","reporter",REPORTERS],["Priority","pri",PRIS],["Type","pub",["Web","Magazine","Both"]],["Category","desk",CATS],["Media","media",MEDIA_TYPES]].map(([lbl,key,opts])=>(
            <div key={key}>
              <div style={{fontSize:11,color:"#94a3b8",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:3}}>{lbl}</div>
              <select value={story[key]||""} onChange={e=>onFieldChange(story.id,key,e.target.value)} style={IS}>{opts.map(o=><option key={o}>{o}</option>)}</select>
            </div>
          ))}
          <div>
            <div style={{fontSize:11,color:"#94a3b8",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:3}}>ETA</div>
            <input type="date" value={story.eta||""} onChange={e=>onFieldChange(story.id,"eta",e.target.value)} style={IS}/>
          </div>
        </div>
      </div>

      {dl!==null&&!["Published","Hold/Dropped"].includes(story.status)&&(
        <div style={{background:ov?"#fef2f2":dl<=3?"#fff7ed":"#f0fdf4",border:`1px solid ${ov?"#fecaca":dl<=3?"#fed7aa":"#bbf7d0"}`,borderRadius:8,padding:"9px 13px",marginBottom:12,fontSize:13,color:ov?"#991b1b":dl<=3?"#9a3412":"#166534"}}>
          {ov?`⚡ Overdue by ${Math.abs(dl)} day${Math.abs(dl)!==1?"s":""}`:`🗓 ${dl} day${dl!==1?"s":""} until deadline`}
        </div>
      )}

      <div className="detail-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"9px 18px",fontSize:13,marginBottom:14}}>
        {[["Format",story.format],["ETA",fmt(story.eta)],["Publish Date",fmt(story.pubDate)],["Issue",story.issue||"—"],["Created",fmt(story.created)]].map(([k,v])=>(
          <div key={k}><div style={{fontSize:11,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:2}}>{k}</div><div style={{fontWeight:600,color:"#1e293b"}}>{v}</div></div>
        ))}
      </div>

      {story.notes&&<div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:8,padding:"9px 13px",marginBottom:12,fontSize:13,color:"#92400e"}}>📝 {story.notes}</div>}
      {story.refs&&<div style={{background:"#f0f9ff",border:"1px solid #bae6fd",borderRadius:8,padding:"9px 13px",marginBottom:12,fontSize:13,color:"#0369a1"}}>🔗 <a href={story.refs} target="_blank" rel="noreferrer" style={{color:"#0369a1"}}>{story.refs}</a></div>}

      <div style={{borderTop:"1px solid #f1f5f9",paddingTop:13,marginBottom:12}}>
        <div style={{fontSize:12,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:9}}>Comments ({comments.length})</div>
        {comments.map(x=>(
          <div key={x.id} style={{background:"#f8fafc",borderRadius:8,padding:"9px 12px",marginBottom:6,fontSize:13}}>
            <div style={{display:"flex",gap:7,alignItems:"center",marginBottom:3,flexWrap:"wrap"}}>
              <span style={{fontWeight:700,color:"#1e293b"}}>{x.author}</span>
              <span style={{color:"#94a3b8",fontSize:11}}>{new Date(x.ts).toLocaleString("en-IN")}</span>
            </div>
            <p style={{margin:0,color:"#475569",lineHeight:1.6}}>{x.text}</p>
          </div>
        ))}
        <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:9,padding:"11px 13px",marginTop:8}}>
          <div style={{marginBottom:8}}>
            <label style={{fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:4}}>Your Name</label>
            <input value={commenter} onChange={e=>setCommenter(e.target.value)} placeholder="Enter your name…" style={{width:"100%",padding:"7px 10px",borderRadius:7,border:"1px solid #e2e8f0",fontSize:13,outline:"none",fontFamily:"inherit",background:"#fff"}}/>
          </div>
          <div style={{marginBottom:8}}>
            <label style={{fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:4}}>Comment</label>
            <textarea value={c} onChange={e=>setC(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&(e.preventDefault(),addC())} placeholder="Write your comment… (Enter to post)" style={{width:"100%",padding:"7px 10px",borderRadius:7,border:"1px solid #e2e8f0",fontSize:13,outline:"none",fontFamily:"inherit",resize:"vertical",minHeight:70,background:"#fff"}}/>
          </div>
          <button onClick={addC} style={{padding:"8px 20px",background:RED,color:"#fff",border:"none",borderRadius:7,fontWeight:600,fontSize:13}}>Post Comment</button>
        </div>
      </div>

      <div style={{display:"flex",gap:8,borderTop:"1px solid #f1f5f9",paddingTop:13}}>
        <button onClick={()=>onEdit(story)} style={{flex:1,padding:"9px 0",background:"#1e293b",color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:700}}>✎ Full Edit</button>
        <button onClick={()=>onDelete(story.id)} style={{padding:"9px 18px",background:"#fef2f2",color:"#dc2626",border:"1px solid #fecaca",borderRadius:8,fontSize:13,fontWeight:600}}>Delete</button>
      </div>
    </div>
  );
}

function TableView({stories,onRow,sk,setSk,sd,setSd,onFieldChange,onDelete,onSort}){
  // Removed _act column — View/Delete gone
  const COLS=[
    {k:"title",l:"Title",w:"32%"},
    {k:"reporter",l:"Reporter",w:"16%"},

    {k:"pri",l:"Priority",w:"12%"},
    {k:"eta",l:"ETA",w:"11%"},
    {k:"pubDate",l:"Published",w:"11%"}
  ];
  const sort=k=>{
    if(sk===k)setSd(d=>d==="asc"?"desc":"asc");
    else{setSk(k);setSd("asc");}
    if(onSort)setTimeout(onSort,0);
  };
  const IS={padding:"3px 6px",borderRadius:5,border:"1px solid #e2e8f0",background:"#f8fafc",fontSize:12,color:"#475569",fontFamily:"inherit",maxWidth:"100%"};

        <thead><tr style={{background:"#f8fafc"}}>
          {COLS.map(c=>(
            <th key={c.k} onClick={()=>sort(c.k)} style={{width:c.w,padding:"10px 12px",textAlign:"left",fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.05em",cursor:"pointer",borderBottom:"2px solid #e2e8f0",whiteSpace:"nowrap",userSelect:"none"}}>
              {c.l}{sk===c.k?(sd==="asc"?" ↑":" ↓"):""}

        </tr></thead>
        <tbody>

            const ov=isOverdue(s);

            return(
              // Clicking anywhere on the row opens the detail modal
              <tr key={s.id} className="hover-row" onClick={()=>onRow(s)} style={{background:ov?"#fff5f5":i%2?"#fafafa":"#fff",borderBottom:"1px solid #f1f5f9",cursor:"pointer"}}>

                  <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{s.desk} · {s.format}</div>
                  {ov&&<span style={{fontSize:10,color:RED,fontWeight:700}}>⚠ OVERDUE</span>}
                </td>
                <td style={{padding:"10px 12px"}} onClick={e=>e.stopPropagation()}>
                  <select value={s.reporter} onChange={e=>onFieldChange(s.id,"reporter",e.target.value)} style={IS}>{REPORTERS.map(o=><option key={o}>{o}</option>)}</select>
                </td>
                <td style={{padding:"10px 12px"}} onClick={e=>e.stopPropagation()}>
                  <select value={s.status} onChange={e=>onFieldChange(s.id,"status",e.target.value)} style={{...IS,color:SC[s.status]}}>{STATUSES.map(o=><option key={o}>{o}</option>)}</select>
                </td>
                <td style={{padding:"10px 12px"}} onClick={e=>e.stopPropagation()}>
                  <select value={s.pri} onChange={e=>onFieldChange(s.id,"pri",e.target.value)} style={{...IS,color:PC[s.pri]}}>{PRIS.map(o=><option key={o}>{o}</option>)}</select>
                </td>
                <td style={{padding:"10px 12px"}} onClick={e=>e.stopPropagation()}>
                  <input type="date" value={etaVal} onChange={e=>onFieldChange(s.id,"eta",e.target.value)} style={{...IS,width:116}}/>
                  {etaVal&&<div style={{fontSize:10,color:ov?RED:"#94a3b8",marginTop:2,fontWeight:ov?700:400}}>{fmt(etaVal)}</div>}

                <td style={{padding:"10px 12px"}}>

  );
}

function CalendarView({stories,onStory}){
  const t=new Date();
  const [mo,setMo]=useState(t.getMonth());
  const [yr,setYr]=useState(t.getFullYear());
  const MN=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const fd=new Date(yr,mo,1).getDay(),dm=new Date(yr,mo+1,0).getDate();
  const byDay={};
  stories.forEach(s=>{
    const d=normaliseDate(s.pubDate)||normaliseDate(s.eta);if(!d)return;
    // FIX: parse local to avoid day-shift
    const m=/^(\d{4})-(\d{2})-(\d{2})$/.exec(d);
    if(!m)return;
    const dt=new Date(+m[1],+m[2]-1,+m[3]);
    if(dt.getMonth()===mo&&dt.getFullYear()===yr){const k=dt.getDate();byDay[k]=byDay[k]||[];byDay[k].push(s);}
  });
  const cells=[];
  for(let i=0;i<fd;i++)cells.push(null);
  for(let d=1;d<=dm;d++)cells.push(d);
  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <button onClick={()=>{if(mo===0){setMo(11);setYr(y=>y-1);}else setMo(m=>m-1);}} style={{padding:"5px 16px",background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:7,fontSize:17,fontWeight:600}}>‹</button>
        <h3 style={{fontSize:17,fontWeight:700,color:"#1e293b"}}>{MN[mo]} {yr}</h3>
        <button onClick={()=>{if(mo===11){setMo(0);setYr(y=>y+1);}else setMo(m=>m+1);}} style={{padding:"5px 16px",background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:7,fontSize:17,fontWeight:600}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:3}}>
        {["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=><div key={d} style={{textAlign:"center",fontSize:10,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",padding:"4px 0"}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
        {cells.map((day,i)=>{
          const isTd=day===t.getDate()&&mo===t.getMonth()&&yr===t.getFullYear();
          const ds=day?(byDay[day]||[]):[];
          return(
            <div key={i} style={{minHeight:75,background:day?"#fff":"transparent",borderRadius:6,border:day?`1px solid ${isTd?RED:"#e8edf3"}`:"none",padding:day?"6px 5px":0}}>
              {day&&<>
                <div style={{width:22,height:22,borderRadius:"50%",background:isTd?RED:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:isTd?800:500,color:isTd?"#fff":"#1e293b",marginBottom:3}}>{day}</div>
                {ds.slice(0,2).map(s=>(
                  <div key={s.id} onClick={()=>onStory(s)} style={{background:(SC[s.status]||"#888")+"20",color:SC[s.status]||"#888",fontSize:9,padding:"2px 4px",borderRadius:3,marginBottom:2,cursor:"pointer",fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.title}</div>
                ))}
                {ds.length>2&&<div style={{fontSize:9,color:"#94a3b8"}}>+{ds.length-2}</div>}
              </>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Analytics({stories}){
  const total=stories.length||1;
  const pub=stories.filter(s=>s.status==="Published").length;
  const ov=stories.filter(isOverdue).length;
  const crit=stories.filter(s=>s.pri==="Critical").length;

  const statData={
    labels:STATUSES.filter(s=>stories.some(x=>x.status===s)),
    datasets:[{
      data:STATUSES.filter(s=>stories.some(x=>x.status===s)).map(s=>stories.filter(x=>x.status===s).length),
      backgroundColor:STATUSES.filter(s=>stories.some(x=>x.status===s)).map(s=>SC[s]||"#888"),
      borderRadius:4
    }]
  };

  const catData={
    labels:CATS.filter(d=>stories.some(x=>x.desk===d)),
    datasets:[{data:CATS.filter(d=>stories.some(x=>x.desk===d)).map(d=>stories.filter(x=>x.desk===d).length),backgroundColor:"#6366f1",borderRadius:4}]
  };

  const activeStories=stories.filter(s=>s.status!=="Published");
  const repData={
    labels:REPORTERS.map(r=>r.split(" ")[0]),
    datasets:[{
      data:REPORTERS.map(r=>activeStories.filter(x=>x.reporter===r).length),
      backgroundColor:RED,borderRadius:4
    }]
  };

  const trendData=(()=>{
    const published=stories.filter(s=>s.status==="Published"&&(s.pubDate||s.eta));
    const getMonday=d=>{const dt=new Date(d);const day=dt.getDay();const diff=dt.getDate()-(day===0?6:day-1);dt.setDate(diff);dt.setHours(0,0,0,0);return dt;};
    const fmtWeek=d=>{const mo=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];return `${mo[d.getMonth()]} ${d.getDate()}`;};
    const now=new Date();const thisMonday=getMonday(now);
    const weeks=[];
    for(let i=7;i>=0;i--){
      const wStart=new Date(thisMonday);wStart.setDate(thisMonday.getDate()-i*7);
      const wEnd=new Date(wStart);wEnd.setDate(wStart.getDate()+7);
      weeks.push({label:fmtWeek(wStart),start:wStart,end:wEnd,web:0,mag:0});
    }
    published.forEach(s=>{
      const raw=normaliseDate(s.pubDate||s.eta);if(!raw)return;
      // FIX: parse local
      const mm=/^(\d{4})-(\d{2})-(\d{2})$/.exec(raw);
      const dt=mm?new Date(+mm[1],+mm[2]-1,+mm[3]):new Date(raw);
      if(isNaN(dt))return;
      for(const w of weeks){
        if(dt>=w.start&&dt<w.end){
          if(s.pub==="Magazine")w.mag++;else w.web++;
          break;
        }
      }
    });
    let first=0;
    for(let i=0;i<weeks.length;i++){if(weeks[i].web>0||weeks[i].mag>0){first=i;break;}}
    const display=weeks.length>2?weeks.slice(Math.min(first,weeks.length-4)):weeks;
    return{
      labels:display.map(w=>w.label),
      datasets:[
        {label:"Web",data:display.map(w=>w.web),borderColor:"#0ea5e9",backgroundColor:"#0ea5e920",fill:true,tension:0.4,pointRadius:4},
        {label:"Magazine",data:display.map(w=>w.mag),borderColor:RED,backgroundColor:RED+"20",fill:true,tension:0.4,pointRadius:4}
      ]
    };
  })();
  const priData={labels:PRIS,datasets:[{data:PRIS.map(p=>stories.filter(x=>x.pri===p).length),backgroundColor:PRIS.map(p=>PC[p]),borderWidth:0}]};
  const pubData={labels:["Web","Magazine","Both"],datasets:[{data:[stories.filter(s=>s.pub==="Web").length,stories.filter(s=>s.pub==="Magazine").length,stories.filter(s=>s.pub==="Both").length],backgroundColor:["#0ea5e9",RED,"#6366f1"],borderWidth:0}]};

  const KPIs=[["📰 Total Stories",total,"#1e293b"],["✅ Published",pub,"#22c55e"],["⚠️ Overdue",ov,"#ef4444"],["🔥 Critical",crit,RED]];
  const card={background:"#fff",borderRadius:12,border:"1px solid #e2e8f0",padding:"15px 18px"};
  const deadlines=stories.filter(s=>s.eta&&!["Published","Hold/Dropped"].includes(s.status)&&daysLeft(s.eta)<=7).sort((a,b)=>new Date(normaliseDate(a.eta))-new Date(normaliseDate(b.eta)));

  return(
    <div>
      <div className="kpi-grid" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>
        {KPIs.map(([l,v,c])=>(
          <div key={l} style={card}>
            <div style={{fontSize:10,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:7}}>{l}</div>
            <div style={{fontSize:28,fontWeight:800,color:c,lineHeight:1}}>{v}</div>
            <div style={{fontSize:11,color:"#94a3b8",marginTop:5}}>{v===total?"In pipeline":v===pub?`${Math.round(pub/total*100)}% done`:v===ov?"Needs attention":"Urgent"}</div>
          </div>
        ))}
      </div>
      <div className="chart-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
        <div style={card}><div style={{fontSize:13,fontWeight:700,color:"#1e293b",marginBottom:10}}>Stories by Status</div><ChartBox type="bar" data={statData} height={210} options={{scales:{x:{ticks:{font:{size:9},maxRotation:35}},y:{ticks:{font:{size:10}}}},plugins:{legend:{display:false}}}}/></div>
        <div style={card}><div style={{fontSize:13,fontWeight:700,color:"#1e293b",marginBottom:10}}>Weekly Publishing Trend</div><ChartBox type="line" data={trendData} height={210} options={{scales:{x:{ticks:{font:{size:10}}},y:{ticks:{font:{size:10}},beginAtZero:true}},plugins:{legend:{display:true,position:"bottom",labels:{boxWidth:9,font:{size:10}}}}}}/></div>
        <div style={card}><div style={{fontSize:13,fontWeight:700,color:"#1e293b",marginBottom:10}}>Stories by Category</div><ChartBox type="bar" data={catData} height={210} options={{indexAxis:"y",scales:{x:{ticks:{font:{size:10}}},y:{ticks:{font:{size:10}}}},plugins:{legend:{display:false}}}}/></div>
        <div style={card}>
          <div style={{fontSize:13,fontWeight:700,color:"#1e293b",marginBottom:10}}>Publication Mix & Priority</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <div><div style={{fontSize:11,color:"#94a3b8",fontWeight:600,marginBottom:4}}>By Type</div><ChartBox type="doughnut" data={pubData} height={130} options={{cutout:"55%",plugins:{legend:{display:false}}}}/>{["Web","Magazine","Both"].map((l,i)=><div key={l} style={{display:"flex",alignItems:"center",gap:4,fontSize:10,marginTop:3}}><div style={{width:8,height:8,borderRadius:2,background:["#0ea5e9",RED,"#6366f1"][i]}}></div><span style={{color:"#64748b"}}>{l}: <b>{pubData.datasets[0].data[i]}</b></span></div>)}</div>
            <div><div style={{fontSize:11,color:"#94a3b8",fontWeight:600,marginBottom:4}}>By Priority</div><ChartBox type="doughnut" data={priData} height={130} options={{cutout:"55%",plugins:{legend:{display:false}}}}/>{PRIS.map(p=><div key={p} style={{display:"flex",alignItems:"center",gap:4,fontSize:10,marginTop:3}}><div style={{width:8,height:8,borderRadius:2,background:PC[p]}}></div><span style={{color:"#64748b"}}>{p}: <b>{stories.filter(x=>x.pri===p).length}</b></span></div>)}</div>
          </div>
        </div>
        <div style={{...card,gridColumn:"1/-1"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <div style={{fontSize:13,fontWeight:700,color:"#1e293b"}}>Reporter Workload</div>
            <div style={{fontSize:11,color:"#94a3b8",background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:6,padding:"2px 9px"}}>Excludes Published stories</div>
          </div>
          <ChartBox type="bar" data={repData} height={150} options={{scales:{x:{ticks:{font:{size:10}}},y:{ticks:{font:{size:10}},beginAtZero:true}},plugins:{legend:{display:false}}}}/>
        </div>
      </div>
      <div style={card}>
        <div style={{fontSize:13,fontWeight:700,color:"#1e293b",marginBottom:10}}>⚡ Deadlines — Next 7 Days</div>
        {deadlines.map(s=>{const d=daysLeft(normaliseDate(s.eta));return(
          <div key={s.id} style={{display:"flex",alignItems:"center",gap:9,padding:"9px 11px",background:d<=0?"#fef2f2":d<=2?"#fff7ed":"#f8fafc",borderRadius:8,border:`1px solid ${d<=0?"#fecaca":d<=2?"#fed7aa":"#e2e8f0"}`,marginBottom:6}}>
            <div style={{width:36,height:36,borderRadius:7,background:d<=0?"#ef4444":d<=2?"#f97316":"#6366f1",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,flexShrink:0}}>{d<=0?"!":d}d</div>
            <div style={{flex:1,minWidth:0}}><div style={{fontWeight:700,fontSize:13,color:"#1e293b",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.title}</div><div style={{fontSize:11,color:"#94a3b8"}}>{s.reporter} · {s.desk}</div></div>
            <SBadge s={s.status} sm/><PBadge p={s.pri} sm/>
          </div>
        );})}
        {!deadlines.length&&<div style={{color:"#94a3b8",textAlign:"center",padding:"14px 0",fontSize:13}}>🎉 No deadlines in the next 7 days</div>}
      </div>
    </div>
  );
}

// REDESIGNED: Status filter as a compact dropdown popover with multi-select + clear
// Groups statuses into logical buckets for easy scanning
const STATUS_GROUPS=[
  {label:"Origination",items:["Idea Proposed","Approved"]},
  {label:"Reporting",items:["Researching","Interview Scheduled"]},
  {label:"Production",items:["Writing","Editing","Video sent for editing","Sent for content cut","Sent for subs","Fact Check"]},
  {label:"Final",items:["Ready to Publish","Scheduled"]},
  {label:"Done",items:["Published","Hold/Dropped"]},
];

function StatusFilterDropdown({selected,onChange}){
  const [open,setOpen]=useState(false);
  const [pos,setPos]=useState({top:0,left:0});
  const btnRef=useRef(null);
  const count=selected.length;

  // Close on outside click
  useEffect(()=>{
    if(!open)return;
    const handler=e=>{
      if(btnRef.current&&!btnRef.current.contains(e.target)){
        // Check if click is inside the portal panel
        const panel=document.getElementById("status-filter-portal");
        if(panel&&panel.contains(e.target))return;
        setOpen(false);
      }
    };
    document.addEventListener("mousedown",handler);
    return()=>document.removeEventListener("mousedown",handler);
  },[open]);

  const openDropdown=()=>{
    if(btnRef.current){
      const r=btnRef.current.getBoundingClientRect();
      setPos({top:r.bottom+window.scrollY+4,left:r.left+window.scrollX});
    }
    setOpen(o=>!o);
  };

  const toggle=s=>{
    const cur=new Set(selected);
    if(cur.has(s))cur.delete(s);else cur.add(s);
    onChange([...cur]);
  };
  const toggleGroup=items=>{
    const allOn=items.every(s=>selected.includes(s));
    const cur=new Set(selected);
    if(allOn)items.forEach(s=>cur.delete(s));
    else items.forEach(s=>cur.add(s));
    onChange([...cur]);
  };

  const btnLabel=count===0?"All Statuses":count===1?selected[0]:`${count} Statuses`;

  const panel=open?ReactDOM.createPortal(
    <div id="status-filter-portal" style={{
      position:"absolute",top:pos.top,left:pos.left,
      background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,
      boxShadow:"0 8px 32px rgba(0,0,0,0.14)",zIndex:9999,
      width:280,padding:10,animation:"slideUp 0.14s ease",
      fontFamily:"'DM Sans',system-ui,sans-serif"
    }}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8,paddingBottom:8,borderBottom:"1px solid #f1f5f9"}}>
        <span style={{fontSize:11,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:"0.06em"}}>Filter by Status</span>
        {count>0&&<button onClick={()=>onChange([])} style={{fontSize:11,color:RED,fontWeight:700,background:"none",border:"none",cursor:"pointer",padding:0}}>Clear all ({count})</button>}
      </div>
      {/* Groups */}
      {STATUS_GROUPS.map(group=>(
        <div key={group.label} style={{marginBottom:8}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:3}}>
            <span style={{fontSize:10,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:"0.06em"}}>{group.label}</span>
            <button onClick={()=>toggleGroup(group.items)} style={{fontSize:10,color:"#6366f1",fontWeight:600,background:"none",border:"none",cursor:"pointer",padding:"0 2px"}}>
              {group.items.every(s=>selected.includes(s))?"Deselect all":"Select all"}
            </button>
          </div>
          {group.items.map(s=>{
            const on=selected.includes(s);
            return(
              <label key={s} className={`status-filter-item${on?" active":""}`} style={{cursor:"pointer",display:"flex",alignItems:"center",gap:8,padding:"6px 8px",borderRadius:6,fontSize:12.5,fontWeight:500,color:"#334155",transition:"background 0.1s",background:on?"#f8fafc":"transparent"}}>
                <input type="checkbox" checked={on} onChange={()=>toggle(s)} style={{width:14,height:14,accentColor:RED,cursor:"pointer",flexShrink:0}}/>
                <span style={{width:8,height:8,borderRadius:"50%",background:SC[s]||"#888",flexShrink:0}}></span>
                <span style={{flex:1,color:on?"#1e293b":"#475569",fontWeight:on?600:400}}>{s}</span>
                {on&&<span style={{width:6,height:6,borderRadius:"50%",background:SC[s]||"#888",flexShrink:0}}></span>}
              </label>
            );
          })}
        </div>
      ))}
      {/* Footer */}
      <div style={{borderTop:"1px solid #f1f5f9",paddingTop:8,display:"flex",gap:6,marginTop:2}}>
        <button onClick={()=>onChange([...STATUSES])} style={{flex:1,padding:"6px 0",background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:6,fontSize:11,fontWeight:600,color:"#475569",cursor:"pointer",fontFamily:"inherit"}}>Select All</button>
        <button onClick={()=>{onChange([]);setOpen(false);}} style={{flex:1,padding:"6px 0",background:"#f1f5f9",border:"1px solid #e2e8f0",borderRadius:6,fontSize:11,fontWeight:600,color:"#64748b",cursor:"pointer",fontFamily:"inherit"}}>Clear & Close</button>
      </div>
    </div>,
    document.body
  ):null;

  return(
    <div style={{position:"relative",flexShrink:0}}>
      <button ref={btnRef} onClick={openDropdown}
        style={{
          display:"inline-flex",alignItems:"center",gap:6,
          padding:"6px 12px",borderRadius:7,
          border:`1.5px solid ${count>0?RED:"#e2e8f0"}`,
          background:count>0?"#fff5f5":"#f8fafc",
          color:count>0?RED:"#475569",
          fontSize:12,fontWeight:count>0?700:500,
          whiteSpace:"nowrap",cursor:"pointer",fontFamily:"inherit",
          transition:"all 0.15s"
        }}>
        <span style={{fontSize:14,lineHeight:1}}>⊞</span>
        {btnLabel}
        {count>0&&(
          <span onClick={e=>{e.stopPropagation();onChange([]);}}
            style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:16,height:16,borderRadius:"50%",background:RED,color:"#fff",fontSize:9,fontWeight:800,cursor:"pointer",flexShrink:0}}>
            ✕
          </span>
        )}
        <span style={{fontSize:10,color:"#94a3b8",marginLeft:2}}>{open?"▲":"▼"}</span>
      </button>
      {panel}
    </div>
  );
}

/* ── APP ── */
function App(){
  const [stories,setStories]=useState([]);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const [view,setView]=useState("table");
  const [showForm,setShowForm]=useState(false);
  const [editing,setEditing]=useState(null);
  const [selectedIdx,setSelectedIdx]=useState(null);
  const [search,setSearch]=useState("");
  const [fCat,setFCat]=useState("All");
  const [fStatuses,setFStatuses]=useState([]);
  const [fPri,setFPri]=useState("All");
  const [fReporter,setFReporter]=useState("All");
  const [fMedia,setFMedia]=useState("All");
  const [sk,setSk]=useState("eta");
  const [sd,setSd]=useState("asc");
  const [stableOrder,setStableOrder]=useState(null);
  const [sync,setSync]=useState("synced");
  const [sideOpen,setSideOpen]=useState(false);
  const [isMobile,setIsMobile]=useState(window.innerWidth<=768);

  useEffect(()=>{
    const h=()=>setIsMobile(window.innerWidth<=768);
    window.addEventListener("resize",h);
    return()=>window.removeEventListener("resize",h);
  },[]);

  useEffect(()=>{if(!isMobile)setSideOpen(true);},[isMobile]);

  useEffect(()=>{
    sheetsApi("getAll")
      .then(res=>{
        if(res.error)setError(res.error);
        else if(res.stories)setStories(res.stories.map(normaliseStory));
        else setError("Unexpected: "+JSON.stringify(res));
        setLoading(false);
      })
      .catch(err=>{setError(err.message);setLoading(false);});
  },[]);

  const handleSubmit=useCallback(async form=>{
    setSync("saving");
    const normForm=normaliseStory(form);
    if(editing){
      const res=await sheetsApi("update",{id:editing.id,story:normForm});
      if(res.success)setStories(s=>s.map(x=>x.id===editing.id?normaliseStory(res.story):x));
    }else{
      const res=await sheetsApi("create",{story:normForm});
      if(res.story)setStories(s=>[...s,normaliseStory(res.story)]);
    }
    setSync("synced");
    // Delay close by 1.6s so the "Saved!" animation is visible
    await new Promise(r=>setTimeout(r,1600));
    setShowForm(false);setEditing(null);
  },[editing]);

  const handleDel=useCallback(async id=>{
    if(!window.confirm("Delete this story? This cannot be undone."))return;
    setSync("saving");
    await sheetsApi("delete",{id});
    setStories(s=>s.filter(x=>x.id!==id));
    setSelectedIdx(null);setSync("synced");
  },[]);

  const handleFieldChange=useCallback(async(id,key,val)=>{
    const normVal=(key==="eta"||key==="pubDate")?normaliseDate(val):val;
    setStories(s=>s.map(x=>x.id===id?{...x,[key]:normVal}:x));
    setSync("saving");
    await sheetsApi("update",{id,story:{[key]:normVal}});
    setSync("synced");
  },[]);

  const handleSaveComment=useCallback(async(id,comments)=>{
    setStories(s=>s.map(x=>x.id===id?{...x,comments}:x));
    setSync("saving");
    await sheetsApi("update",{id,story:{comments}});
    setSync("synced");
  },[]);

  const liveFiltered=useMemo(()=>{
    let s=[...stories];
    if(search)s=s.filter(x=>x.title.toLowerCase().includes(search.toLowerCase())||x.reporter.toLowerCase().includes(search.toLowerCase())||x.desk.toLowerCase().includes(search.toLowerCase()));
    if(fCat!=="All")s=s.filter(x=>x.desk===fCat);
    if(fStatuses.length>0)s=s.filter(x=>fStatuses.includes(x.status));
    if(fPri!=="All")s=s.filter(x=>x.pri===fPri);
    if(fReporter!=="All")s=s.filter(x=>x.reporter===fReporter);
    if(fMedia!=="All")s=s.filter(x=>(x.media||"Text")===fMedia);
    return s;
  },[stories,search,fCat,fStatuses,fPri,fReporter,fMedia]);

  const applySortOrder=useCallback((arr)=>{
    const copy=[...arr];
    copy.sort((a,b)=>{
      let va=a[sk]||"",vb=b[sk]||"";
      if(sk==="pri"){const o={Critical:0,High:1,Medium:2,Low:3};va=o[va];vb=o[vb];}
      return sd==="asc"?(va<vb?-1:1):(va>vb?-1:1);
    });
    return copy.map(x=>x.id);
  },[sk,sd]);

  useEffect(()=>{
    setStableOrder(applySortOrder(liveFiltered));
  },[search,fCat,fStatuses,fPri,fReporter,fMedia,sk,sd]);

  useEffect(()=>{
    if(stableOrder===null&&liveFiltered.length>0){
      setStableOrder(applySortOrder(liveFiltered));
    }
  },[liveFiltered.length]);

  const filtered=useMemo(()=>{
    if(!stableOrder||stableOrder.length===0)return liveFiltered;
    const orderMap=new Map(stableOrder.map((id,i)=>[id,i]));
    return [...liveFiltered].sort((a,b)=>{
      const ia=orderMap.has(a.id)?orderMap.get(a.id):Infinity;
      const ib=orderMap.has(b.id)?orderMap.get(b.id):Infinity;
      return ia-ib;
    });
  },[liveFiltered,stableOrder]);

  const selectedStory=selectedIdx!==null?filtered[selectedIdx]:null;
  const ovCount=stories.filter(isOverdue).length;
  const BG="#f1f5f9";
  const CARD="#fff";
  const TP="#1e293b";
  const TS="#64748b";
  const BC="#e2e8f0";
  const VIEWS=[{id:"analytics",l:"Dashboard",i:"📊"},{id:"table",l:"Table View",i:"📋"},{id:"kanban",l:"Kanban Board",i:"🗂"},{id:"calendar",l:"Calendar",i:"📅"}];
  const selStyle={padding:"5px 8px",borderRadius:7,border:`1px solid ${BC}`,background:"#f8fafc",color:TS,fontSize:12,fontFamily:"inherit"};

  const LOADING_SCREEN=(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:14,background:"#111827"}}>
      <div style={{width:46,height:46,background:RED,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <span style={{color:"#fff",fontWeight:900,fontSize:22}}>F</span>
      </div>
      <div style={{color:"#94a3b8",fontSize:14}}>Dashboard is loading…</div>
    </div>
  );

  const ERROR_SCREEN=(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:14,background:"#111827",padding:24}}>
      <div style={{fontSize:38}}>⚠️</div>
      <div style={{color:"#f87171",fontSize:16,fontWeight:700}}>Could not connect to Google Sheets</div>
      <div style={{color:"#64748b",fontSize:13,maxWidth:440,textAlign:"center",lineHeight:1.6}}>Error: {error}</div>
      <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:10,padding:"14px 18px",maxWidth:440,width:"100%"}}>
        {["URL must NOT contain /u/1/","Deploy → Who has access → Anyone","Re-deploy after any script change","Open /exec URL in browser — should return JSON","Run getAllStories() in Apps Script to authorize"].map((t,i)=>(
          <div key={i} style={{display:"flex",gap:7,marginBottom:5,fontSize:12,color:"#94a3b8"}}>
            <span style={{color:"#f97316",fontWeight:700,flexShrink:0}}>{i+1}.</span><span>{t}</span>
          </div>
        ))}
      </div>
      <button onClick={()=>{setError(null);setLoading(true);sheetsApi("getAll").then(res=>{if(res.stories)setStories(res.stories.map(normaliseStory));else setError(res.error||"Failed");setLoading(false);}).catch(e=>{setError(e.message);setLoading(false);});}} style={{padding:"10px 24px",background:RED,color:"#fff",border:"none",borderRadius:8,fontWeight:700,fontSize:14,cursor:"pointer"}}>↺ Retry</button>
    </div>
  );

  if(loading)return LOADING_SCREEN;
  if(error)return ERROR_SCREEN;

  return(
    <div style={{display:"flex",minHeight:"100vh",background:BG,color:TP}}>

      {isMobile&&sideOpen&&<div className="sidebar-overlay" onClick={()=>setSideOpen(false)}/>}

      {/* SIDEBAR */}
      <div style={{width:sideOpen?228:0,minWidth:sideOpen?228:0,background:"#111827",transition:"width 0.22s ease,min-width 0.22s ease",flexShrink:0,display:"flex",flexDirection:"column",position:isMobile?"fixed":"sticky",top:0,left:0,height:"100vh",overflowY:"auto",overflowX:"hidden",zIndex:50}}>
        <div style={{padding:"15px 13px",borderBottom:"1px solid rgba(255,255,255,0.07)",display:"flex",alignItems:"center",minHeight:58,flexShrink:0}}>
          <div style={{width:32,height:32,background:RED,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <span style={{color:"#fff",fontWeight:900,fontSize:14}}>F</span>
          </div>
          <div style={{marginLeft:10}}>
            <div style={{color:"#fff",fontWeight:800,fontSize:13,lineHeight:1.2}}>Forbes India</div>
            <div style={{color:"#4b5563",fontSize:10,marginTop:1}}>Editorial Workflow</div>
          </div>
        </div>
        <nav style={{padding:"11px 7px",flex:1}}>
          {VIEWS.map(v=>(
            <button key={v.id} className="nav-btn" onClick={()=>{setView(v.id);if(isMobile)setSideOpen(false);}} style={{width:"100%",display:"flex",alignItems:"center",gap:9,padding:"9px 10px",borderRadius:7,border:"none",cursor:"pointer",marginBottom:2,background:view===v.id?"rgba(200,16,46,0.18)":"transparent",color:view===v.id?"#f87171":"#6b7280",textAlign:"left",fontSize:13,fontWeight:view===v.id?700:400}}>
              <span style={{fontSize:15,flexShrink:0}}>{v.i}</span>
              <span>{v.l}</span>
            </button>
          ))}
          <div style={{marginTop:18,paddingLeft:3}}>
            <div style={{fontSize:10,color:"#374151",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6,paddingLeft:7}}>Reporters</div>
            <button onClick={()=>setFReporter("All")} style={{width:"100%",textAlign:"left",padding:"5px 9px",borderRadius:6,border:"none",cursor:"pointer",background:fReporter==="All"?"rgba(99,102,241,0.18)":"transparent",color:fReporter==="All"?"#818cf8":"#6b7280",fontSize:12,marginBottom:1,fontFamily:"inherit",fontWeight:fReporter==="All"?700:400}}>All Reporters</button>
            {REPORTERS.map(r=>(
              <button key={r} onClick={()=>{setFReporter(fReporter===r?"All":r);if(isMobile)setSideOpen(false);}} style={{width:"100%",textAlign:"left",padding:"5px 9px",borderRadius:6,border:"none",cursor:"pointer",background:fReporter===r?"rgba(99,102,241,0.18)":"transparent",color:fReporter===r?"#818cf8":"#6b7280",fontSize:12,marginBottom:1,fontFamily:"inherit",fontWeight:fReporter===r?700:400}}>{r}</button>
            ))}
          </div>
        </nav>
      </div>

      {/* MAIN */}
      <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>

        {/* Top bar — 2 rows */}
        <div style={{background:CARD,borderBottom:`1px solid ${BC}`,position:"sticky",top:0,zIndex:40}}>

          {/* ROW 1: ☰ | Title | Search | Filters | Synced */}
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"9px 16px 7px",flexWrap:"nowrap",overflow:"hidden"}}>
            <button onClick={()=>setSideOpen(o=>!o)} style={{padding:"5px 8px",background:"transparent",border:"none",borderRadius:7,fontSize:19,color:TS,cursor:"pointer",flexShrink:0,lineHeight:1}}>☰</button>

            <h1 style={{fontSize:17,fontWeight:800,color:TP,lineHeight:1,flexShrink:0,marginRight:4}}>{VIEWS.find(v=>v.id===view)?.l}</h1>

            <div style={{flex:1}}/>

            {/* Search */}
            <div className="desktop-only" style={{display:"flex",alignItems:"center",gap:6,background:"#f1f5f9",borderRadius:7,padding:"5px 10px",flexShrink:0}}>
              <span style={{color:TS,fontSize:13}}>🔍</span>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search stories…" style={{border:"none",background:"transparent",outline:"none",fontSize:12,color:TP,width:130,fontFamily:"inherit"}}/>
            </div>

            {/* Status filter */}
            <StatusFilterDropdown selected={fStatuses} onChange={setFStatuses}/>

            {/* Other filters */}
            <div className="topbar-filters desktop-only" style={{display:"flex",gap:5,flexShrink:0}}>
              <select value={fMedia} onChange={e=>setFMedia(e.target.value)} style={selStyle}><option value="All">All Media</option>{MEDIA_TYPES.map(o=><option key={o}>{o}</option>)}</select>
              <select value={fCat} onChange={e=>setFCat(e.target.value)} style={selStyle}><option value="All">All Categories</option>{CATS.map(o=><option key={o}>{o}</option>)}</select>
              <select value={fPri} onChange={e=>setFPri(e.target.value)} style={selStyle}><option value="All">All Priorities</option>{PRIS.map(o=><option key={o}>{o}</option>)}</select>
              <select value={fReporter} onChange={e=>setFReporter(e.target.value)} style={selStyle}><option value="All">All Reporters</option>{REPORTERS.map(o=><option key={o}>{o}</option>)}</select>
            </div>

            {/* Synced */}
            <div style={{padding:"5px 10px",background:sync==="saving"?"#fffbeb":"#f0fdf4",borderRadius:7,fontSize:11,color:sync==="saving"?"#92400e":"#166534",whiteSpace:"nowrap",fontWeight:600,flexShrink:0}}>{sync==="saving"?"⏳ Saving…":"✓ Synced"}</div>
          </div>

          {/* ROW 2: story count (left) | + Add Story (right) */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 16px 8px",borderTop:"1px solid #f1f5f9"}}>
            <div style={{fontSize:12,color:TS,lineHeight:1}}>
              <span style={{fontWeight:700,color:TP}}>{filtered.length} stories</span>
              {ovCount>0&&<span style={{color:"#ef4444",fontWeight:700}}> · ⚠ {ovCount} overdue</span>}
              {fReporter!=="All"&&<span style={{color:"#818cf8",fontWeight:600}}> · {fReporter.split(" ")[0]}</span>}
              {fStatuses.length>0&&<span style={{color:RED,fontWeight:600}}> · {fStatuses.length} status{fStatuses.length>1?"es":""} active</span>}
            </div>
            <button onClick={()=>{setEditing(null);setShowForm(true);}}
              style={{padding:"6px 16px",background:RED,color:"#fff",border:"none",borderRadius:7,fontWeight:700,whiteSpace:"nowrap",flexShrink:0,cursor:"pointer",fontSize:13,lineHeight:1}}>
              + Add Story
            </button>
          </div>

        </div>

        {/* Mobile filter row */}
        <div className="mobile-filter-row">
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search…" style={{minWidth:110}}/>
          <select value={fMedia} onChange={e=>setFMedia(e.target.value)}><option value="All">All Media</option>{MEDIA_TYPES.map(o=><option key={o}>{o}</option>)}</select>
          <select value={fCat} onChange={e=>setFCat(e.target.value)}><option value="All">All Categories</option>{CATS.map(o=><option key={o}>{o}</option>)}</select>
          <select value={fPri} onChange={e=>setFPri(e.target.value)}><option value="All">All Priorities</option>{PRIS.map(o=><option key={o}>{o}</option>)}</select>
        </div>

        {/* Content */}
        <div style={{flex:1,padding:"16px 18px",overflowY:"auto"}}>
          {view==="analytics"&&<Analytics stories={stories}/>}
          {view==="table"&&(
            <div style={{background:CARD,borderRadius:10,border:`1px solid ${BC}`,overflow:"hidden"}}>
              <TableView stories={filtered} onRow={s=>{const i=filtered.findIndex(x=>x.id===s.id);setSelectedIdx(i);}} sk={sk} setSk={setSk} sd={sd} setSd={setSd} onFieldChange={handleFieldChange} onDelete={handleDel} onSort={()=>setStableOrder(applySortOrder(liveFiltered))}/>
            </div>
          )}
          {view==="kanban"&&<KanbanView stories={filtered} onCard={s=>{const i=filtered.findIndex(x=>x.id===s.id);setSelectedIdx(i);}}/>}
          {view==="calendar"&&<div style={{background:CARD,borderRadius:10,border:`1px solid ${BC}`,padding:18}}><CalendarView stories={stories} onStory={s=>{const i=filtered.findIndex(x=>x.id===s.id);setSelectedIdx(i>=0?i:null);}}/></div>}
        </div>
      </div>

      {/* MODALS */}
      {(showForm||editing)&&(
        <Modal title={editing?"Edit Story":"Submit New Story"} onClose={()=>{setShowForm(false);setEditing(null);}} wide>
          <StoryForm onSubmit={handleSubmit} init={editing} onCancel={()=>{setShowForm(false);setEditing(null);}}/>
        </Modal>
      )}

      {selectedStory&&!editing&&(
        <Modal title={selectedStory.title} onClose={()=>setSelectedIdx(null)} wide>
          <StoryDetail
            story={selectedStory}
            onEdit={s=>{setEditing(s);setSelectedIdx(null);}}
            onDelete={id=>{handleDel(id);setSelectedIdx(null);}}
            onFieldChange={handleFieldChange}
            onSaveComment={handleSaveComment}
            onPrev={()=>setSelectedIdx(i=>Math.max(i-1,0))}
            onNext={()=>setSelectedIdx(i=>Math.min(i+1,filtered.length-1))}
            hasPrev={selectedIdx>0}
            hasNext={selectedIdx<filtered.length-1}
          />
        </Modal>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
